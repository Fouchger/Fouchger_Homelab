# ================================================================
# File: tasks/terraform.Taskfile.yml
# Purpose:
#   Provide Terraform commands for the Proxmox-backed homelab stack.
#
# Notes:
#   - Secrets are sourced from repo-managed files under state/.
#   - The Proxmox node name is discovered and written into state/configs/.env.
#   - Stable template IDs are injected from the repo env file when present.
#   - Template bootstrap is opt-in and should not be part of the default apply.
#   - REPO_DIR is sourced from state/configs/.env and used to build
#     absolute paths for SSH keys and other repo-managed artefacts.
# ================================================================

version: '3'

silent: false

vars:
  TERRAFORM_DIR: 'terraform/environments/lab'
  ENV_FILE: 'state/configs/.env'
  TOKEN_ENV_FILE: 'state/secrets/proxmox/proxmox-api-token.env'
  DEFAULT_TERRAFORM_BIN: '{{.TERRAFORM_BIN | default "terraform"}}'
  TEMPLATE_BOOTSTRAP: '{{.TEMPLATE_BOOTSTRAP | default "false"}}'

tasks:
  terraform:check:
    desc: Verify Terraform CLI dependencies are available
    cmds:
      - |
          set -euo pipefail
          missing=0
          for tool in terraform awk sed jq; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required Terraform tool: $tool" >&2
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]
          echo 'Terraform tooling is available'

  terraform:env:check:
    desc: Verify required secret inputs are available for Terraform
    deps:
      - proxmox:dirs
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'

          if [ ! -f "${env_file}" ]; then
            echo "Missing required Proxmox env file: ${env_file}" >&2
            echo 'Run: task proxmox:env:ensure' >&2
            exit 1
          fi

          # shellcheck disable=SC1090
          . "${env_file}"

          : "${REPO_DIR:?REPO_DIR must be set in ${env_file}}"

          ssh_key="${REPO_DIR}/state/secrets/ssh/id_ed25519_homelab"

          if [ ! -f "${token_file}" ]; then
            echo "Missing required Proxmox token file: ${token_file}" >&2
            echo 'Run: task proxmox:api-user' >&2
            exit 1
          fi

          if [ ! -f "${ssh_key}" ]; then
            echo "Missing required SSH private key: ${ssh_key}" >&2
            echo 'Run: task secrets:ssh:keys' >&2
            exit 1
          fi

          echo 'Terraform secret inputs are present'

  terraform:init:
    desc: Initialise the Terraform lab environment using repo-managed secrets
    deps:
      - terraform:env:check
      - terraform:check
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          : "${REPO_DIR:?REPO_DIR must be set in ${env_file}}"
          : "${PROXMOX_HOST:?PROXMOX_HOST must be set in ${env_file}}"
          : "${PROXMOX_NODE_NAME:?PROXMOX_NODE_NAME must be set in ${env_file}}"

          ssh_key_path="${REPO_DIR}/state/secrets/ssh/id_ed25519_homelab"
          ssh_pub_key_path="${ssh_key_path}.pub"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path="${ssh_key_path}"
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat "${ssh_pub_key_path}")"
          export TF_VAR_enable_template_bootstrap='{{.TEMPLATE_BOOTSTRAP}}'
          export TF_VAR_vm_template_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_VM_TEMPLATE_UBUNTU24_ID:-9002}" \
            --arg rocky9 "${PROXMOX_VM_TEMPLATE_ROCKY9_ID:-9001}" \
            '{ubuntu24: ($ubuntu24 | tonumber), rocky9: ($rocky9 | tonumber)}')"
          export TF_VAR_lxc_template_file_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_LXC_TEMPLATE_UBUNTU24_FILE_ID:-}" \
            'if $ubuntu24 == "" then {} else {ubuntu24: $ubuntu24} end')"

          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} init

  terraform:validate:
    desc: Validate the Terraform lab environment
    deps:
      - terraform:init
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          : "${REPO_DIR:?REPO_DIR must be set in ${env_file}}"
          : "${PROXMOX_HOST:?PROXMOX_HOST must be set in ${env_file}}"
          : "${PROXMOX_NODE_NAME:?PROXMOX_NODE_NAME must be set in ${env_file}}"

          ssh_key_path="${REPO_DIR}/state/secrets/ssh/id_ed25519_homelab"
          ssh_pub_key_path="${ssh_key_path}.pub"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path="${ssh_key_path}"
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat "${ssh_pub_key_path}")"
          export TF_VAR_enable_template_bootstrap='{{.TEMPLATE_BOOTSTRAP}}'
          export TF_VAR_vm_template_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_VM_TEMPLATE_UBUNTU24_ID:-9002}" \
            --arg rocky9 "${PROXMOX_VM_TEMPLATE_ROCKY9_ID:-9001}" \
            '{ubuntu24: ($ubuntu24 | tonumber), rocky9: ($rocky9 | tonumber)}')"
          export TF_VAR_lxc_template_file_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_LXC_TEMPLATE_UBUNTU24_FILE_ID:-}" \
            'if $ubuntu24 == "" then {} else {ubuntu24: $ubuntu24} end')"

          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} validate

  terraform:plan:
    desc: Plan the Terraform Proxmox stack using repo-managed secrets
    deps:
      - terraform:init
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          : "${REPO_DIR:?REPO_DIR must be set in ${env_file}}"
          : "${PROXMOX_HOST:?PROXMOX_HOST must be set in ${env_file}}"
          : "${PROXMOX_NODE_NAME:?PROXMOX_NODE_NAME must be set in ${env_file}}"

          ssh_key_path="${REPO_DIR}/state/secrets/ssh/id_ed25519_homelab"
          ssh_pub_key_path="${ssh_key_path}.pub"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path="${ssh_key_path}"
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat "${ssh_pub_key_path}")"
          export TF_VAR_enable_template_bootstrap='{{.TEMPLATE_BOOTSTRAP}}'
          export TF_VAR_vm_template_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_VM_TEMPLATE_UBUNTU24_ID:-9002}" \
            --arg rocky9 "${PROXMOX_VM_TEMPLATE_ROCKY9_ID:-9001}" \
            '{ubuntu24: ($ubuntu24 | tonumber), rocky9: ($rocky9 | tonumber)}')"
          export TF_VAR_lxc_template_file_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_LXC_TEMPLATE_UBUNTU24_FILE_ID:-}" \
            'if $ubuntu24 == "" then {} else {ubuntu24: $ubuntu24} end')"

          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} plan -out=tfplan

  terraform:apply:
    desc: Apply the Terraform Proxmox stack using repo-managed secrets
    deps:
      - terraform:init
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          : "${REPO_DIR:?REPO_DIR must be set in ${env_file}}"
          : "${PROXMOX_HOST:?PROXMOX_HOST must be set in ${env_file}}"
          : "${PROXMOX_NODE_NAME:?PROXMOX_NODE_NAME must be set in ${env_file}}"

          ssh_key_path="${REPO_DIR}/state/secrets/ssh/id_ed25519_homelab"
          ssh_pub_key_path="${ssh_key_path}.pub"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path="${ssh_key_path}"
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat "${ssh_pub_key_path}")"
          export TF_VAR_enable_template_bootstrap='{{.TEMPLATE_BOOTSTRAP}}'
          export TF_VAR_vm_template_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_VM_TEMPLATE_UBUNTU24_ID:-9002}" \
            --arg rocky9 "${PROXMOX_VM_TEMPLATE_ROCKY9_ID:-9001}" \
            '{ubuntu24: ($ubuntu24 | tonumber), rocky9: ($rocky9 | tonumber)}')"
          export TF_VAR_lxc_template_file_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_LXC_TEMPLATE_UBUNTU24_FILE_ID:-}" \
            'if $ubuntu24 == "" then {} else {ubuntu24: $ubuntu24} end')"

          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} apply

  terraform:bootstrap:plan:
    desc: Plan optional template bootstrap resources on Proxmox
    cmds:
      - task: terraform:plan
        vars:
          TEMPLATE_BOOTSTRAP: 'true'

  terraform:bootstrap:apply:
    desc: Apply optional template bootstrap resources on Proxmox
    cmds:
      - task: terraform:apply -auto-approve
        vars:
          TEMPLATE_BOOTSTRAP: 'true'

  terraform:destroy:
    desc: Destroy all Terraform-managed Proxmox resources using repo-managed secrets
    deps:
      - terraform:init
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          : "${REPO_DIR:?REPO_DIR must be set in ${env_file}}"
          : "${PROXMOX_HOST:?PROXMOX_HOST must be set in ${env_file}}"
          : "${PROXMOX_NODE_NAME:?PROXMOX_NODE_NAME must be set in ${env_file}}"

          ssh_key_path="${REPO_DIR}/state/secrets/ssh/id_ed25519_homelab"
          ssh_pub_key_path="${ssh_key_path}.pub"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path="${ssh_key_path}"
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat "${ssh_pub_key_path}")"
          export TF_VAR_enable_template_bootstrap='{{.TEMPLATE_BOOTSTRAP}}'
          export TF_VAR_vm_template_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_VM_TEMPLATE_UBUNTU24_ID:-9002}" \
            --arg rocky9 "${PROXMOX_VM_TEMPLATE_ROCKY9_ID:-9001}" \
            '{ubuntu24: ($ubuntu24 | tonumber), rocky9: ($rocky9 | tonumber)}')"
          export TF_VAR_lxc_template_file_ids="$(jq -cn \
            --arg ubuntu24 "${PROXMOX_LXC_TEMPLATE_UBUNTU24_FILE_ID:-}" \
            'if $ubuntu24 == "" then {} else {ubuntu24: $ubuntu24} end')"

          echo '[1/1] Destroying Terraform-managed infrastructure'
          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} destroy