# ================================================================
# File: ansible/inventories/lab/group_vars/all.yml
# Purpose:
#   Default group variables for the lab inventory.
#
# Notes:
#   - Generated inventory lives under state/ansible/inventory/.
#   - Host-specific ansible_user values are rendered from Terraform outputs.
# ================================================================

ansible_become: true
ansible_python_interpreter: /usr/bin/python3
homelab_timezone: Pacific/Auckland
homelab_domain: lab.local

base_linux_packages:
  - curl
  - git
  - jq
  - python3
  - python3-pip
  - rsync
  - unzip
  - vim

container_runtime_packages:
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
