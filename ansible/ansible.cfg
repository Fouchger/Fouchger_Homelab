# ================================================================
# File: ansible/ansible.cfg
# Purpose:
#   Local Ansible configuration for the homelab repository.
#
# Notes:
#   - This file is intended to be loaded explicitly via ANSIBLE_CONFIG
#     from Task tasks executed at the repository root.
#   - Paths are defined relative to this ansible/ directory.
#   - YAML output now uses the built-in default callback with
#     result_format=yaml for ansible-core 2.13+ compatibility.
# ================================================================

[defaults]
inventory = ../state/ansible/inventory/lab/hosts.yml
roles_path = ./roles
collections_paths = ./collections:~/.ansible/collections:/usr/share/ansible/collections
host_key_checking = False
interpreter_python = auto_silent
retry_files_enabled = False
stdout_callback = ansible.builtin.default
result_format = yaml
bin_ansible_callbacks = True
forks = 20

[ssh_connection]
pipelining = True