# ================================================================
# File: taskfile/proxmox_scripts.Taskfile.yml
# Purpose:
#   Wrappers to create VM and LXC workloads.
#
# Notes:
#   - This file provides thin wrappers over the shared proxmox_vm tasks.
# ================================================================
version: '3'

silent: true

tasks:
  mikrotik-routeros:
    desc: Create or reconcile the MikroTik RouterOS CHR VM
    cmds:
      - task: :proxmox_vm:create:standard
        vars:
          SERVER_NAME: 'router01'
          SECRET_NAME: 'ROUTER01_PASSWORD'
          SECRET_PROMPT: 'Enter bootstrap password for router01: '
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/mikrotik-routeros.sh'
          INVENTORY_GROUP: 'routers'
          VM_DEFAULT_ID: '21000'
          VM_DEFAULT_HOSTNAME: 'router01'
          VM_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'mikrotik-routeros'
          HELPER_REMOTE_NAME: 'mikrotik-routeros.sh'

  opnsense:
    desc: Create or reconcile the OPNsense VM
    cmds:
      - task: :proxmox_vm:create:standard
        vars:
          SERVER_NAME: 'opnsense01'
          SECRET_NAME: 'OPNSENSE01_PASSWORD'
          SECRET_PROMPT: 'Enter bootstrap password for opnsense01: '
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/opnsense-vm.sh'
          INVENTORY_GROUP: 'firewalls'
          VM_DEFAULT_ID: '21001'
          VM_DEFAULT_HOSTNAME: 'opnsense01'
          VM_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'opnsense-vm'
          HELPER_REMOTE_NAME: 'opnsense-vm.sh'