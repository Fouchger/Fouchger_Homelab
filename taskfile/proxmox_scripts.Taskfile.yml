# ================================================================
# File: taskfile/proxmox_scripts.Taskfile.yml
# Purpose:
#   Wrappers to create VM and LXC workloads.
#
# Notes:
#   - VM wrappers call the shared proxmox_vm workflow.
#   - LXC wrappers call the shared proxmox_lxc workflow.
#   - Existing VM and LXC workloads are skipped by default.
#   - Set APPROVE_RECREATE=true to allow LXC recreation.
# ================================================================
version: '3'

silent: true

tasks:
  mikrotik-routeros:
    desc: Create or reconcile the MikroTik RouterOS CHR VM
    cmds:
      - task: :proxmox_vm:create:standard
        vars:
          SERVER_NAME: 'router01'
          SECRET_NAME: 'ROUTER01_PASSWORD'
          SECRET_PROMPT: 'Enter bootstrap password for router01: '
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/mikrotik-routeros.sh'
          WORKFLOW_SCRIPT: 'scripts/proxmox_workflows/generic-vm-discovery.sh'
          INVENTORY_GROUP: 'routers'
          VM_DEFAULT_ID: '21000'
          VM_DEFAULT_HOSTNAME: 'router01'
          VM_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'mikrotik-routeros'
          HELPER_REMOTE_NAME: 'mikrotik-routeros.sh'
          APPROVE_RECREATE: '{{default "false" .APPROVE_RECREATE}}'


  technitiumdns:
    desc: Create the Technitium DNS LXC, or skip if it already exists unless recreate is explicitly approved
    cmds:
      - task: :proxmox_lxc:create:standard
        vars:
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/technitiumdns.sh'
          WORKFLOW_SCRIPT: 'scripts/proxmox_workflows/generic-lxc-discovery.sh'
          INVENTORY_GROUP: 'dns'
          REMOTE_TMP_PREFIX: 'technitiumdns'
          HELPER_REMOTE_NAME: 'technitiumdns.sh'
          APPROVE_RECREATE: '{{default "false" .APPROVE_RECREATE}}'
          HELPER_ENV_FILE_CONTENT: |
            export var_unprivileged='1'
            export var_cpu='1'
            export var_ram='1024'
            export var_disk='5'
            export var_brg='vmbr0'
            export var_net='192.168.30.10/24'
            export var_gateway='192.168.30.1'
            export var_mtu=''
            export var_vlan='30'
            export var_mac='BC:24:11:86:A2:BA'
            export var_ns='192.168.30.10'
            export var_ipv6_method='auto'
            export var_ssh='yes'
            export var_ssh_authorized_key='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKZSTcjgRzpQbw0CB8lVqpCEyskAWiHxzRZ5K+tseCDz fouchger@outlook.com'
            export var_apt_cacher='no'
            export var_fuse='no'
            export var_tun='no'
            export var_gpu='no'
            export var_nesting='1'
            export var_keyctl='0'
            export var_mknod='0'
            export var_mount_fs=' '
            export var_protection='no'
            export var_timezone='Pacific/Auckland'
            export var_tags=''
            export var_verbose='yes'
            export var_ctid='22000'
            export var_hostname='technitium01'
            export var_primary_nic='net0'
            export var_searchdomain='home.local'
            export var_template_storage='local'
            export var_container_storage='local-lvm'

