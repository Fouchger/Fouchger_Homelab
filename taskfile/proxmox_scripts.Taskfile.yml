# ================================================================
# File: taskfile/proxmox_scripts.Taskfile.yml
# Purpose:
#   Wrappers to create VM and LXC workloads.
#
# Notes:
#   - VM wrappers call the shared proxmox_vm workflow.
#   - LXC wrappers call the shared proxmox_lxc workflow.
#   - Existing VM and LXC workloads are skipped by default.
#   - Set APPROVE_RECREATE=true to allow explicit VM or LXC recreation behaviour where implemented.
# ================================================================
version: '3'

silent: true

tasks:
  mikrotik-routeros:
    desc: Create or reconcile the MikroTik RouterOS CHR VM
    cmds:
      - task: :proxmox_vm:create:standard
        vars:
          SERVER_NAME: 'router01'
          SECRET_NAME: 'ROUTER01_PASSWORD'
          SECRET_PROMPT: 'Enter bootstrap password for router01: '
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/mikrotik-routeros.sh'
          WORKFLOW_SCRIPT: 'scripts/proxmox_workflows/generic-vm-discovery.sh'
          INVENTORY_GROUP: 'routers'
          VM_DEFAULT_ID: '21000'
          VM_DEFAULT_HOSTNAME: 'router01'
          VM_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'mikrotik-routeros'
          HELPER_REMOTE_NAME: 'mikrotik-routeros.sh'
          APPROVE_RECREATE: '{{default "false" .APPROVE_RECREATE}}'

  opnsense:
    desc: Create or reconcile the OPNsense VM
    cmds:
      - task: :proxmox_vm:create:standard
        vars:
          SERVER_NAME: 'opnsense01'
          SECRET_NAME: 'OPNSENSE01_PASSWORD'
          SECRET_PROMPT: 'Enter bootstrap password for opnsense01: '
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/opnsense-vm.sh'
          WORKFLOW_SCRIPT: 'scripts/proxmox_workflows/generic-vm-discovery.sh'
          INVENTORY_GROUP: 'firewalls'
          VM_DEFAULT_ID: '21001'
          VM_DEFAULT_HOSTNAME: 'opnsense01'
          VM_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'opnsense-vm'
          HELPER_REMOTE_NAME: 'opnsense-vm.sh'
          APPROVE_RECREATE: '{{default "false" .APPROVE_RECREATE}}'

  technitiumdns:
    desc: Create the Technitium DNS LXC, or skip if it already exists unless recreate is explicitly approved
    cmds:
      - task: :proxmox_lxc:create:standard
        vars:
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/technitiumdns.sh'
          WORKFLOW_SCRIPT: 'scripts/proxmox_workflows/generic-lxc-discovery.sh'
          INVENTORY_GROUP: 'dns'
          LXC_DEFAULT_ID: '22000'
          LXC_DEFAULT_HOSTNAME: 'technitium01'
          LXC_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'technitiumdns'
          HELPER_REMOTE_NAME: 'technitiumdns.sh'
          WORKFLOW_REMOTE_NAME: 'generic-lxc-discovery.sh'
          APPROVE_RECREATE: '{{default "false" .APPROVE_RECREATE}}'

  pihole:
    desc: Create the Pi-hole LXC, or skip if it already exists unless recreate is explicitly approved
    cmds:
      - task: :proxmox_lxc:create:standard
        vars:
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/pihole.sh'
          WORKFLOW_SCRIPT: 'scripts/proxmox_workflows/generic-lxc-discovery.sh'
          INVENTORY_GROUP: 'dns'
          LXC_DEFAULT_ID: '22011'
          LXC_DEFAULT_HOSTNAME: 'pihole01'
          LXC_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'pihole'
          HELPER_REMOTE_NAME: 'pihole.sh'
          WORKFLOW_REMOTE_NAME: 'generic-lxc-discovery.sh'
          APPROVE_RECREATE: '{{default "false" .APPROVE_RECREATE}}'

  unbound:
    desc: Create the Unbound LXC, or skip if it already exists unless recreate is explicitly approved
    cmds:
      - task: :proxmox_lxc:create:standard
        vars:
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/unbound.sh'
          WORKFLOW_SCRIPT: 'scripts/proxmox_workflows/generic-lxc-discovery.sh'
          INVENTORY_GROUP: 'dns'
          LXC_DEFAULT_ID: '22012'
          LXC_DEFAULT_HOSTNAME: 'unbound01'
          LXC_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'unbound'
          HELPER_REMOTE_NAME: 'unbound.sh'
          WORKFLOW_REMOTE_NAME: 'generic-lxc-discovery.sh'
          APPROVE_RECREATE: '{{default "false" .APPROVE_RECREATE}}'

  calibre-web:
    desc: Create the Calibre-Web LXC, or skip if it already exists unless recreate is explicitly approved
    cmds:
      - task: :proxmox_lxc:create:standard
        vars:
          HELPER_SCRIPT: 'scripts/proxmox_helper_scripts/calibre-web.sh'
          WORKFLOW_SCRIPT: 'scripts/proxmox_workflows/generic-lxc-discovery.sh'
          INVENTORY_GROUP: 'media'
          LXC_DEFAULT_ID: '22020'
          LXC_DEFAULT_HOSTNAME: 'calibre01'
          LXC_PRIMARY_NIC: 'net0'
          REMOTE_TMP_PREFIX: 'calibre-web'
          HELPER_REMOTE_NAME: 'calibre-web.sh'
          WORKFLOW_REMOTE_NAME: 'generic-lxc-discovery.sh'
          APPROVE_RECREATE: '{{default "false" .APPROVE_RECREATE}}'

