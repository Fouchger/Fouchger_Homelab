# ################################################################
# File: tasks/secrets.Taskfile.yml
# Created: 2026/03/07
# Updated: 2026/03/07
# Description:
#   Standardised secrets lifecycle management for the homelab.
#
# Notes:
#   - All secrets live under: state/secrets/
#   - SOPS + age are the source of truth for Git-managed secrets.
#   - OpenBao is used for runtime secrets and transit auto-unseal bootstrap.
#   - This Taskfile is designed to be idempotent and safe to re-run.
#   - Transit auto-unseal is intended for a separate bootstrap OpenBao cluster.
#   - Plaintext is only written to temporary files and is removed on exit.
#
# Usage examples:
#   task -t secrets.Taskfile.yml init
#   task -t secrets.Taskfile.yml age:keygen
#   task -t secrets.Taskfile.yml sops:config
#   task -t secrets.Taskfile.yml secret:new FILE=app/prod.env FORMAT=env
#   task -t secrets.Taskfile.yml secret:edit FILE=app/prod.env
#   task -t secrets.Taskfile.yml openbao:init
#   task -t secrets.Taskfile.yml openbao:unseal
#   task -t secrets.Taskfile.yml openbao:bootstrap:transit
#
# Required tools:
#   - bash
#   - age-keygen
#   - sops
#   - jq
#   - curl
#   - bao
#
# Environment variables:
#   AGE_IDENTITY_FILE              Optional override for local age identity file
#   AGE_RECIPIENTS_FILE            Optional override for recipients file
#   OPENBAO_ADDR                   Target OpenBao address, e.g. https://bao.example.lab:8200
#   OPENBAO_CACERT                 Optional CA file for OpenBao TLS
#   OPENBAO_SKIP_VERIFY            true|false, default false
#   OPENBAO_INIT_SHARES            Default 5
#   OPENBAO_INIT_THRESHOLD         Default 3
#   OPENBAO_TRANSIT_ADDR           Bootstrap transit cluster address
#   OPENBAO_TRANSIT_CACERT         Optional CA file for transit cluster
#   OPENBAO_TRANSIT_NAMESPACE      Optional namespace
#   OPENBAO_TRANSIT_MOUNT          Default transit
#   OPENBAO_TRANSIT_KEY            Default autounseal
#   OPENBAO_TRANSIT_POLICY         Default autounseal
#   OPENBAO_TRANSIT_TOKEN_PERIOD   Default 720h
# ################################################################

version: '3'

silent: false

vars:
  SECRETS_DIR: state/secrets
  AGE_DIR: '{{.SECRETS_DIR}}/age'
  SOPS_CONFIG_FILE: .sops.yaml

  AGE_IDENTITY_FILE: '{{default (printf "%s/local-admin.agekey" .AGE_DIR) .AGE_IDENTITY_FILE}}'
  AGE_RECIPIENTS_FILE: '{{default (printf "%s/recipients.txt" .AGE_DIR) .AGE_RECIPIENTS_FILE}}'

  OPENBAO_DIR: '{{.SECRETS_DIR}}/openbao'
  OPENBAO_BOOTSTRAP_DIR: '{{.OPENBAO_DIR}}/bootstrap'
  OPENBAO_RUNTIME_DIR: '{{.OPENBAO_DIR}}/runtime'
  OPENBAO_POLICIES_DIR: '{{.OPENBAO_DIR}}/policies'
  OPENBAO_RENDERED_DIR: '{{.OPENBAO_DIR}}/rendered'

  OPENBAO_INIT_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/init.enc.json'
  OPENBAO_AUTOUNSEAL_ENV_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/autounseal-transit.env'
  OPENBAO_AUTOUNSEAL_ENV_ENC_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/autounseal-transit.enc.env'
  OPENBAO_POLICY_FILE: '{{.OPENBAO_POLICIES_DIR}}/autounseal.hcl'
  OPENBAO_POLICY_ENC_FILE: '{{.OPENBAO_POLICIES_DIR}}/autounseal.enc.hcl'
  OPENBAO_STATUS_FILE: '{{.OPENBAO_RENDERED_DIR}}/status.json'

  OPENBAO_INIT_SHARES: '{{default "5" .OPENBAO_INIT_SHARES}}'
  OPENBAO_INIT_THRESHOLD: '{{default "3" .OPENBAO_INIT_THRESHOLD}}'

  OPENBAO_TRANSIT_MOUNT: '{{default "transit" .OPENBAO_TRANSIT_MOUNT}}'
  OPENBAO_TRANSIT_KEY: '{{default "autounseal" .OPENBAO_TRANSIT_KEY}}'
  OPENBAO_TRANSIT_POLICY: '{{default "autounseal" .OPENBAO_TRANSIT_POLICY}}'
  OPENBAO_TRANSIT_TOKEN_PERIOD: '{{default "720h" .OPENBAO_TRANSIT_TOKEN_PERIOD}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list -t {{.TASKFILE}}

  all:
    desc: Run the standard local secrets bootstrap sequence in the correct order
    cmds:
      - task: init
      - task: tools:check
      - task: age:keygen
      - task: age:recipient
      - task: sops:config

  openbao:all:
    desc: Run the OpenBao bootstrap sequence in the correct order
    cmds:
      - task: init
      - task: tools:check
      - task: age:keygen
      - task: age:recipient
      - task: sops:config
      - task: openbao:init
      - task: openbao:unseal
      - task: openbao:bootstrap:transit
      - task: openbao:runtime:kv:enable


  init:
    desc: Create the standard secrets directory structure
    cmds:
      - |
        set -eu
        mkdir -p \
          "{{.SECRETS_DIR}}" \
          "{{.AGE_DIR}}" \
          "{{.OPENBAO_BOOTSTRAP_DIR}}" \
          "{{.OPENBAO_RUNTIME_DIR}}" \
          "{{.OPENBAO_POLICIES_DIR}}" \
          "{{.OPENBAO_RENDERED_DIR}}"
        chmod 700 "{{.SECRETS_DIR}}" "{{.AGE_DIR}}" "{{.OPENBAO_BOOTSTRAP_DIR}}" "{{.OPENBAO_RUNTIME_DIR}}" || true
        echo "Initialised secrets layout under {{.SECRETS_DIR}}"

  tools:check:
    desc: Check required tools are installed
    cmds:
      - |
        set -eu
        for tool in bash age-keygen sops jq curl bao; do
          command -v "$tool" >/dev/null 2>&1 || {
            echo "Missing required tool: $tool" >&2
            exit 1
          }
        done
        echo "All required tools are available"

  age:keygen:
    desc: Create the local age identity if it does not already exist
    deps: [init, tools:check]
    status:
      - test -f "{{.AGE_IDENTITY_FILE}}"
    cmds:
      - |
        set -eu
        umask 077
        mkdir -p "$(dirname "{{.AGE_IDENTITY_FILE}}")"
        age-keygen -o "{{.AGE_IDENTITY_FILE}}"
        chmod 600 "{{.AGE_IDENTITY_FILE}}"
        echo "Created age identity: {{.AGE_IDENTITY_FILE}}"

  age:recipient:
    desc: Refresh the recipients file from the local age identity
    deps: [age:keygen]
    cmds:
      - |
        set -eu
        umask 077
        mkdir -p "$(dirname "{{.AGE_RECIPIENTS_FILE}}")"
        age-keygen -y "{{.AGE_IDENTITY_FILE}}" > "{{.AGE_RECIPIENTS_FILE}}"
        chmod 600 "{{.AGE_RECIPIENTS_FILE}}"
        echo "Updated recipients file: {{.AGE_RECIPIENTS_FILE}}"

  sops:config:
    desc: Generate the repo .sops.yaml for files under state/secrets/
    deps: [age:recipient]
    cmds:
      - |
        set -eu
        RECIPIENTS="$(paste -sd, "{{.AGE_RECIPIENTS_FILE}}")"
        cat > "{{.SOPS_CONFIG_FILE}}" <<EOF
        # ################################################################
        # File: {{.SOPS_CONFIG_FILE}}
        # Created: 2026/03/07
        # Updated: 2026/03/07
        # Description:
        #   SOPS creation rules for all secrets stored under state/secrets/.
        # Notes:
        #   - Only encrypted files should live in Git.
        #   - Plaintext working files should remain temporary and untracked.
        # ################################################################
        creation_rules:
          - path_regex: ^state/secrets/.*\.(enc\.ya?ml|enc\.json|enc\.env|enc\.ini|enc\.txt|enc\.hcl)$
            age: >-
              ${RECIPIENTS}
        EOF
        echo "Generated {{.SOPS_CONFIG_FILE}}"

  secret:new:
    desc: Create a new encrypted secret file
    deps: [sops:config]
    preconditions:
      - sh: test -n "{{.FILE}}"
        msg: "Provide FILE, for example FILE=apps/example.enc.yaml or FILE=apps/example.enc.env"
      - sh: test -n "{{.FORMAT}}"
        msg: "Provide FORMAT, one of: yaml, json, env, ini, txt, hcl"
    cmds:
      - |
        set -eu
        TARGET="{{.SECRETS_DIR}}/{{.FILE}}"
        TMP="$(mktemp)"
        trap 'rm -f "$TMP"' EXIT

        mkdir -p "$(dirname "$TARGET")"

        case "{{.FORMAT}}" in
          yaml)
            cat > "$TMP" <<'EOF'
            # Example secret file
            # Replace values, then re-run edit as needed.
            example:
              username: change-me
              password: change-me
            EOF
            sops --encrypt --input-type yaml --output-type yaml "$TMP" > "$TARGET"
            ;;
          json)
            cat > "$TMP" <<'EOF'
            {
              "example": {
                "username": "change-me",
                "password": "change-me"
              }
            }
            EOF
            sops --encrypt --input-type json --output-type json "$TMP" > "$TARGET"
            ;;
          env)
            cat > "$TMP" <<'EOF'
            EXAMPLE_USERNAME=change-me
            EXAMPLE_PASSWORD=change-me
            EOF
            sops --encrypt --input-type dotenv --output-type dotenv "$TMP" > "$TARGET"
            ;;
          ini)
            cat > "$TMP" <<'EOF'
            [example]
            username=change-me
            password=change-me
            EOF
            sops --encrypt --input-type ini --output-type ini "$TMP" > "$TARGET"
            ;;
          txt|hcl)
            cat > "$TMP" <<'EOF'
            replace-me
            EOF
            sops --encrypt "$TMP" > "$TARGET"
            ;;
          *)
            echo "Unsupported FORMAT: {{.FORMAT}}" >&2
            exit 1
            ;;
        esac

        chmod 600 "$TARGET"
        echo "Created encrypted secret: $TARGET"

  secret:edit:
    desc: Edit an encrypted secret file in place with SOPS
    deps: [sops:config]
    preconditions:
      - sh: test -n "{{.FILE}}"
        msg: "Provide FILE, for example FILE=apps/example.enc.yaml"
      - sh: test -f "{{.SECRETS_DIR}}/{{.FILE}}"
        msg: "Encrypted secret file not found"
    cmds:
      - sops "{{.SECRETS_DIR}}/{{.FILE}}"

  secret:view:
    desc: Decrypt a secret file to stdout
    deps: [sops:config]
    preconditions:
      - sh: test -n "{{.FILE}}"
        msg: "Provide FILE, for example FILE=apps/example.enc.yaml"
      - sh: test -f "{{.SECRETS_DIR}}/{{.FILE}}"
        msg: "Encrypted secret file not found"
    cmds:
      - sops --decrypt "{{.SECRETS_DIR}}/{{.FILE}}"

  secret:rotate:
    desc: Rotate data keys for an encrypted file
    deps: [sops:config]
    preconditions:
      - sh: test -n "{{.FILE}}"
        msg: "Provide FILE, for example FILE=apps/example.enc.yaml"
      - sh: test -f "{{.SECRETS_DIR}}/{{.FILE}}"
        msg: "Encrypted secret file not found"
    cmds:
      - sops rotate -i "{{.SECRETS_DIR}}/{{.FILE}}"
      - echo "Rotated SOPS data key for {{.SECRETS_DIR}}/{{.FILE}}"

  secret:list:
    desc: List encrypted secret files
    deps: [init]
    cmds:
      - |
        set -eu
        find "{{.SECRETS_DIR}}" -type f \( \
          -name '*.enc.yaml' -o \
          -name '*.enc.yml' -o \
          -name '*.enc.json' -o \
          -name '*.enc.env' -o \
          -name '*.enc.ini' -o \
          -name '*.enc.txt' -o \
          -name '*.enc.hcl' \
        \) | sort

  openbao:env:check:
    desc: Validate the target OpenBao environment
    deps: [tools:check]
    preconditions:
      - sh: test -n "${OPENBAO_ADDR:-}"
        msg: "Set OPENBAO_ADDR, for example OPENBAO_ADDR=https://bao.example.lab:8200"
    cmds:
      - |
        set -eu
        echo "OPENBAO_ADDR=${OPENBAO_ADDR}"

  openbao:status:
    desc: Query OpenBao health and persist the response
    deps: [init, openbao:env:check]
    cmds:
      - |
        set -eu
        TLS_ARGS=""
        if [ -n "${OPENBAO_CACERT:-}" ]; then
          TLS_ARGS="$TLS_ARGS --cacert ${OPENBAO_CACERT}"
        fi
        if [ "${OPENBAO_SKIP_VERIFY:-false}" = "true" ]; then
          TLS_ARGS="$TLS_ARGS -k"
        fi

        HTTP_CODE="$(sh -c "curl -sS $TLS_ARGS -o '{{.OPENBAO_STATUS_FILE}}' -w '%{http_code}' '${OPENBAO_ADDR}/v1/sys/health?standbyok=true'")"
        echo "HTTP status: ${HTTP_CODE}"
        cat "{{.OPENBAO_STATUS_FILE}}" 2>/dev/null || true

  openbao:init:
    desc: Initialise a new OpenBao cluster and store the init bundle encrypted with SOPS
    deps: [init, sops:config, openbao:env:check]
    cmds:
      - |
        set -eu
        TLS_ARGS=""
        BAO_TLS_ARGS=""
        if [ -n "${OPENBAO_CACERT:-}" ]; then
          TLS_ARGS="$TLS_ARGS --cacert ${OPENBAO_CACERT}"
          BAO_TLS_ARGS="$BAO_TLS_ARGS -ca-cert=${OPENBAO_CACERT}"
        fi
        if [ "${OPENBAO_SKIP_VERIFY:-false}" = "true" ]; then
          TLS_ARGS="$TLS_ARGS -k"
          BAO_TLS_ARGS="$BAO_TLS_ARGS -tls-skip-verify"
        fi

        HTTP_CODE="$(sh -c "curl -sS $TLS_ARGS -o /dev/null -w '%{http_code}' '${OPENBAO_ADDR}/v1/sys/health' || true")"
        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "429" ] || [ "$HTTP_CODE" = "503" ]; then
          echo "OpenBao is already initialised or sealed; skipping init"
          exit 0
        fi

        if [ "$HTTP_CODE" != "501" ]; then
          echo "Unexpected health status while checking init state: $HTTP_CODE" >&2
          exit 1
        fi

        if [ -f "{{.OPENBAO_INIT_FILE}}" ]; then
          echo "Encrypted init file already exists: {{.OPENBAO_INIT_FILE}}"
          exit 0
        fi

        TMP="$(mktemp)"
        trap 'rm -f "$TMP"' EXIT

        sh -c "BAO_ADDR='${OPENBAO_ADDR}' bao operator init $BAO_TLS_ARGS -key-shares={{.OPENBAO_INIT_SHARES}} -key-threshold={{.OPENBAO_INIT_THRESHOLD}} -format=json" > "$TMP"
        sops --encrypt --input-type json --output-type json "$TMP" > "{{.OPENBAO_INIT_FILE}}"
        chmod 600 "{{.OPENBAO_INIT_FILE}}"

        echo "Initialised OpenBao and stored encrypted init bundle at {{.OPENBAO_INIT_FILE}}"

  openbao:unseal:
    desc: Unseal OpenBao using keys from the encrypted init bundle
    deps: [openbao:env:check, openbao:init]
    preconditions:
      - sh: test -f "{{.OPENBAO_INIT_FILE}}"
        msg: "Encrypted init bundle not found. Run openbao:init first."
    cmds:
      - |
        set -eu
        TLS_ARGS=""
        BAO_TLS_ARGS=""
        if [ -n "${OPENBAO_CACERT:-}" ]; then
          TLS_ARGS="$TLS_ARGS --cacert ${OPENBAO_CACERT}"
          BAO_TLS_ARGS="$BAO_TLS_ARGS -ca-cert=${OPENBAO_CACERT}"
        fi
        if [ "${OPENBAO_SKIP_VERIFY:-false}" = "true" ]; then
          TLS_ARGS="$TLS_ARGS -k"
          BAO_TLS_ARGS="$BAO_TLS_ARGS -tls-skip-verify"
        fi

        HTTP_CODE="$(sh -c "curl -sS $TLS_ARGS -o /dev/null -w '%{http_code}' '${OPENBAO_ADDR}/v1/sys/health?standbyok=true' || true")"
        if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "429" ]; then
          echo "OpenBao is already unsealed"
          exit 0
        fi

        if [ "$HTTP_CODE" != "503" ]; then
          echo "OpenBao is not in a sealed state. HTTP status: $HTTP_CODE"
          exit 0
        fi

        TMP="$(mktemp)"
        trap 'rm -f "$TMP"' EXIT
        sops --decrypt "{{.OPENBAO_INIT_FILE}}" > "$TMP"

        COUNT=0
        jq -r '.unseal_keys_b64[]' "$TMP" | while IFS= read -r key; do
          COUNT=$((COUNT + 1))
          sh -c "BAO_ADDR='${OPENBAO_ADDR}' bao operator unseal $BAO_TLS_ARGS '${key}'" >/dev/null
          if [ "$COUNT" -ge "{{.OPENBAO_INIT_THRESHOLD}}" ]; then
            break
          fi
        done

        echo "Unseal attempted"

  openbao:policy:render:
    desc: Render the autounseal policy locally
    deps: [init]
    cmds:
      - |
        set -eu
        cat > "{{.OPENBAO_POLICY_FILE}}" <<EOF
        # ################################################################
        # File: {{.OPENBAO_POLICY_FILE}}
        # Created: 2026/03/07
        # Updated: 2026/03/07
        # Description:
        #   Minimal policy for transit-based auto-unseal.
        # Notes:
        #   - Permissions are intentionally limited to encrypt/decrypt.
        # ################################################################
        path "{{.OPENBAO_TRANSIT_MOUNT}}/encrypt/{{.OPENBAO_TRANSIT_KEY}}" {
          capabilities = ["update"]
        }

        path "{{.OPENBAO_TRANSIT_MOUNT}}/decrypt/{{.OPENBAO_TRANSIT_KEY}}" {
          capabilities = ["update"]
        }
        EOF
        chmod 600 "{{.OPENBAO_POLICY_FILE}}"
        sops --encrypt "{{.OPENBAO_POLICY_FILE}}" > "{{.OPENBAO_POLICY_ENC_FILE}}"
        rm -f "{{.OPENBAO_POLICY_FILE}}"
        chmod 600 "{{.OPENBAO_POLICY_ENC_FILE}}"
        echo "Rendered encrypted policy: {{.OPENBAO_POLICY_ENC_FILE}}"

  openbao:bootstrap:transit:
    desc: Bootstrap transit mount, key, policy and periodic orphan token on the bootstrap OpenBao cluster
    deps: [openbao:unseal, openbao:policy:render]
    preconditions:
      - sh: test -n "${OPENBAO_ADDR:-}"
        msg: "Set OPENBAO_ADDR to the bootstrap OpenBao cluster"
      - sh: test -f "{{.OPENBAO_INIT_FILE}}"
        msg: "Encrypted init bundle not found. Run openbao:init first."
    cmds:
      - |
        set -eu
        BAO_TLS_ARGS=""
        if [ -n "${OPENBAO_CACERT:-}" ]; then
          BAO_TLS_ARGS="$BAO_TLS_ARGS -ca-cert=${OPENBAO_CACERT}"
        fi
        if [ "${OPENBAO_SKIP_VERIFY:-false}" = "true" ]; then
          BAO_TLS_ARGS="$BAO_TLS_ARGS -tls-skip-verify"
        fi

        TMP_INIT="$(mktemp)"
        TMP_POLICY="$(mktemp)"
        TMP_TOKEN="$(mktemp)"
        trap 'rm -f "$TMP_INIT" "$TMP_POLICY" "$TMP_TOKEN"' EXIT

        sops --decrypt "{{.OPENBAO_INIT_FILE}}" > "$TMP_INIT"
        ROOT_TOKEN="$(jq -r '.root_token' "$TMP_INIT")"

        export BAO_ADDR="${OPENBAO_ADDR}"
        export BAO_TOKEN="${ROOT_TOKEN}"

        if ! bao secrets list $BAO_TLS_ARGS -format=json | jq -e 'has("{{.OPENBAO_TRANSIT_MOUNT}}/")' >/dev/null; then
          bao secrets enable $BAO_TLS_ARGS -path="{{.OPENBAO_TRANSIT_MOUNT}}" transit
          echo "Enabled transit secrets engine"
        else
          echo "Transit secrets engine already enabled"
        fi

        if ! bao read $BAO_TLS_ARGS -format=json "{{.OPENBAO_TRANSIT_MOUNT}}/keys/{{.OPENBAO_TRANSIT_KEY}}" >/dev/null 2>&1; then
          bao write $BAO_TLS_ARGS -f "{{.OPENBAO_TRANSIT_MOUNT}}/keys/{{.OPENBAO_TRANSIT_KEY}}"
          echo "Created transit key: {{.OPENBAO_TRANSIT_KEY}}"
        else
          echo "Transit key already exists: {{.OPENBAO_TRANSIT_KEY}}"
        fi

        sops --decrypt "{{.OPENBAO_POLICY_ENC_FILE}}" > "$TMP_POLICY"
        bao policy write $BAO_TLS_ARGS "{{.OPENBAO_TRANSIT_POLICY}}" "$TMP_POLICY"
        echo "Applied policy: {{.OPENBAO_TRANSIT_POLICY}}"

        if [ -f "{{.OPENBAO_AUTOUNSEAL_ENV_ENC_FILE}}" ]; then
          echo "Encrypted autounseal env already exists: {{.OPENBAO_AUTOUNSEAL_ENV_ENC_FILE}}"
          exit 0
        fi

        TOKEN_JSON="$(bao token create $BAO_TLS_ARGS \
          -policy='{{.OPENBAO_TRANSIT_POLICY}}' \
          -orphan \
          -period='{{.OPENBAO_TRANSIT_TOKEN_PERIOD}}' \
          -renewable=true \
          -format=json)"

        CLIENT_TOKEN="$(printf '%s' "$TOKEN_JSON" | jq -r '.auth.client_token')"

        cat > "$TMP_TOKEN" <<EOF
        # ################################################################
        # File: {{.OPENBAO_AUTOUNSEAL_ENV_FILE}}
        # Created: 2026/03/07
        # Updated: 2026/03/07
        # Description:
        #   Transit auto-unseal environment variables for workload OpenBao clusters.
        # Notes:
        #   - Store encrypted only.
        #   - Prefer mounting via secret management or sealed runtime env.
        # ################################################################
        VAULT_SEAL_TYPE=transit
        VAULT_ADDR=${OPENBAO_ADDR}
        VAULT_TOKEN=${CLIENT_TOKEN}
        VAULT_TRANSIT_SEAL_KEY_NAME={{.OPENBAO_TRANSIT_KEY}}
        VAULT_TRANSIT_SEAL_MOUNT_PATH={{.OPENBAO_TRANSIT_MOUNT}}/
        EOF

        sops --encrypt --input-type dotenv --output-type dotenv "$TMP_TOKEN" > "{{.OPENBAO_AUTOUNSEAL_ENV_ENC_FILE}}"
        chmod 600 "{{.OPENBAO_AUTOUNSEAL_ENV_ENC_FILE}}"

        echo "Created encrypted autounseal env: {{.OPENBAO_AUTOUNSEAL_ENV_ENC_FILE}}"

  openbao:autounseal:view:
    desc: View the encrypted transit auto-unseal env file
    deps: [sops:config]
    preconditions:
      - sh: test -f "{{.OPENBAO_AUTOUNSEAL_ENV_ENC_FILE}}"
        msg: "Autounseal env not found. Run openbao:bootstrap:transit first."
    cmds:
      - sops --decrypt "{{.OPENBAO_AUTOUNSEAL_ENV_ENC_FILE}}"

  openbao:runtime:kv:enable:
    desc: Enable KV v2 at the standard runtime path if it does not already exist
    deps: [openbao:unseal]
    preconditions:
      - sh: test -f "{{.OPENBAO_INIT_FILE}}"
        msg: "Encrypted init bundle not found. Run openbao:init first."
    cmds:
      - |
        set -eu
        BAO_TLS_ARGS=""
        if [ -n "${OPENBAO_CACERT:-}" ]; then
          BAO_TLS_ARGS="$BAO_TLS_ARGS -ca-cert=${OPENBAO_CACERT}"
        fi
        if [ "${OPENBAO_SKIP_VERIFY:-false}" = "true" ]; then
          BAO_TLS_ARGS="$BAO_TLS_ARGS -tls-skip-verify"
        fi

        TMP_INIT="$(mktemp)"
        trap 'rm -f "$TMP_INIT"' EXIT
        sops --decrypt "{{.OPENBAO_INIT_FILE}}" > "$TMP_INIT"

        export BAO_ADDR="${OPENBAO_ADDR}"
        export BAO_TOKEN="$(jq -r '.root_token' "$TMP_INIT")"

        if ! bao secrets list $BAO_TLS_ARGS -format=json | jq -e 'has("kv/")' >/dev/null; then
          bao secrets enable $BAO_TLS_ARGS -path=kv -version=2 kv
          echo "Enabled KV v2 at kv/"
        else
          echo "KV v2 already enabled at kv/"
        fi

  openbao:runtime:secret:put:
    desc: Write a runtime secret to OpenBao KV v2
    deps: [openbao:runtime:kv:enable]
    preconditions:
      - sh: test -n "{{.PATH}}"
        msg: "Provide PATH, for example PATH=apps/example"
      - sh: test -n "{{.KV}}"
        msg: "Provide KV, for example KV='username=demo password=secret'"
    cmds:
      - |
        set -eu
        BAO_TLS_ARGS=""
        if [ -n "${OPENBAO_CACERT:-}" ]; then
          BAO_TLS_ARGS="$BAO_TLS_ARGS -ca-cert=${OPENBAO_CACERT}"
        fi
        if [ "${OPENBAO_SKIP_VERIFY:-false}" = "true" ]; then
          BAO_TLS_ARGS="$BAO_TLS_ARGS -tls-skip-verify"
        fi

        TMP_INIT="$(mktemp)"
        trap 'rm -f "$TMP_INIT"' EXIT
        sops --decrypt "{{.OPENBAO_INIT_FILE}}" > "$TMP_INIT"

        export BAO_ADDR="${OPENBAO_ADDR}"
        export BAO_TOKEN="$(jq -r '.root_token' "$TMP_INIT")"

        # shellcheck disable=SC2086
        bao kv put $BAO_TLS_ARGS "kv/{{.PATH}}" {{.KV}}
        echo "Wrote runtime secret to kv/{{.PATH}}"

  openbao:runtime:secret:get:
    desc: Read a runtime secret from OpenBao KV v2
    deps: [openbao:runtime:kv:enable]
    preconditions:
      - sh: test -n "{{.PATH}}"
        msg: "Provide PATH, for example PATH=apps/example"
    cmds:
      - |
        set -eu
        BAO_TLS_ARGS=""
        if [ -n "${OPENBAO_CACERT:-}" ]; then
          BAO_TLS_ARGS="$BAO_TLS_ARGS -ca-cert=${OPENBAO_CACERT}"
        fi
        if [ "${OPENBAO_SKIP_VERIFY:-false}" = "true" ]; then
          BAO_TLS_ARGS="$BAO_TLS_ARGS -tls-skip-verify"
        fi

        TMP_INIT="$(mktemp)"
        trap 'rm -f "$TMP_INIT"' EXIT
        sops --decrypt "{{.OPENBAO_INIT_FILE}}" > "$TMP_INIT"

        export BAO_ADDR="${OPENBAO_ADDR}"
        export BAO_TOKEN="$(jq -r '.root_token' "$TMP_INIT")"

        bao kv get $BAO_TLS_ARGS "kv/{{.PATH}}"