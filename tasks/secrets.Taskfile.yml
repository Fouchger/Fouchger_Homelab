# ================================================================
# File: secrets.Taskfile.yml
# Purpose:
#   Standardised secrets management tasks for the homelab.
#
# Scope:
#   - Phase 1: age + SOPS bootstrap and encrypted file handling
#   - Phase 2: OpenBao standalone bootstrap with TLS and Raft storage
#   - Phase 3: OpenBao transit auto-unseal preparation and policy scaffolding
#
# Design notes:
#   - All secrets and generated security artefacts live under state/secrets/
#   - Tasks are written to be idempotent where practical
#   - Existing keys, certificates, config, and bootstrap outputs are not
#     overwritten unless a dedicated rotate/reset task is added later
#   - Plaintext is avoided where possible; when generated temporarily it is
#     written under state/secrets/.tmp/ and removed on task exit
#   - This Taskfile is intended to be called directly or included from the
#     project root Taskfile
# ================================================================

version: '3'

silent: false

vars:
  ROOT_DIR:
    sh: pwd
  OPENBAO_RUNTIME_SYSTEM_DIR: '{{default "/var/lib/openbao" .OPENBAO_RUNTIME_SYSTEM_DIR}}'
  OPENBAO_DATA_DIR_ABS: '{{.OPENBAO_RUNTIME_SYSTEM_DIR}}/data'
  OPENBAO_INSTALL_DIR_ABS: '{{.OPENBAO_INSTALL_DIR}}'
  STATE_DIR: state
  SECRETS_DIR: '{{.STATE_DIR}}/secrets'
  TMP_DIR: '{{.SECRETS_DIR}}/.tmp'
  BIN_DIR: '{{.SECRETS_DIR}}/bin'

  AGE_DIR: '{{.SECRETS_DIR}}/age'
  AGE_ADMIN_KEY: '{{.AGE_DIR}}/admin.key'
  AGE_RECOVERY_KEY: '{{.AGE_DIR}}/recovery.key'
  AGE_ADMIN_PUB: '{{.AGE_DIR}}/admin.pub'
  AGE_RECOVERY_PUB: '{{.AGE_DIR}}/recovery.pub'
  AGE_KEYS_FILE: '{{.AGE_DIR}}/keys.txt'

  SOPS_CONFIG_FILE: .sops.yaml
  SOPS_SAMPLE_FILE: '{{.SECRETS_DIR}}/sops/examples/bootstrap.enc.yaml'
  SOPS_SAMPLE_PLAIN_FILE: '{{.TMP_DIR}}/bootstrap.yaml'

  OPENBAO_DIR: '{{.SECRETS_DIR}}/openbao'
  OPENBAO_BOOTSTRAP_DIR: '{{.OPENBAO_DIR}}/bootstrap'
  OPENBAO_RUNTIME_DIR: '{{.OPENBAO_DIR}}/runtime'
  OPENBAO_POLICIES_DIR: '{{.OPENBAO_DIR}}/policies'
  OPENBAO_RENDERED_DIR: '{{.OPENBAO_DIR}}/rendered'
  OPENBAO_TLS_DIR: '{{.OPENBAO_DIR}}/tls'
  OPENBAO_CA_DIR: '{{.OPENBAO_TLS_DIR}}/ca'
  OPENBAO_SERVER_TLS_DIR: '{{.OPENBAO_TLS_DIR}}/server'
  OPENBAO_TRANSIT_DIR: '{{.OPENBAO_DIR}}/transit'
  OPENBAO_DATA_DIR: '{{.OPENBAO_RUNTIME_DIR}}/data'
  OPENBAO_CONFIG_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.hcl'
  OPENBAO_ENV_FILE: '{{.OPENBAO_RENDERED_DIR}}/openbao.env'
  OPENBAO_POLICY_AUTOUNSEAL: '{{.OPENBAO_POLICIES_DIR}}/autounseal.hcl'
  OPENBAO_STATUS_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/status.json'
  OPENBAO_INIT_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/init.json'
  OPENBAO_KEYS_JSON: '{{.OPENBAO_BOOTSTRAP_DIR}}/unseal-keys.json'
  OPENBAO_ROOT_TOKEN_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/root-token.txt'
  OPENBAO_TRANSIT_BOOTSTRAP_FILE: '{{.OPENBAO_BOOTSTRAP_DIR}}/transit-autounseal.json'

  OPENBAO_SCHEME: '{{default "https" .OPENBAO_SCHEME}}'
  OPENBAO_HOST: '{{default "127.0.0.1" .OPENBAO_HOST}}'
  OPENBAO_PORT: '{{default "8200" .OPENBAO_PORT}}'
  OPENBAO_CLUSTER_PORT: '{{default "8201" .OPENBAO_CLUSTER_PORT}}'
  OPENBAO_ADDR: '{{.OPENBAO_SCHEME}}://{{.OPENBAO_HOST}}:{{.OPENBAO_PORT}}'
  OPENBAO_API_ADDR: '{{.OPENBAO_ADDR}}'
  OPENBAO_CLUSTER_ADDR: 'https://{{.OPENBAO_HOST}}:{{.OPENBAO_CLUSTER_PORT}}'
  OPENBAO_DNS_ALT_NAMES: '{{default "127.0.0.1,localhost" .OPENBAO_DNS_ALT_NAMES}}'
  OPENBAO_IP_ALT_NAMES: '{{default "127.0.0.1" .OPENBAO_IP_ALT_NAMES}}'
  OPENBAO_INIT_SHARES: '{{default "5" .OPENBAO_INIT_SHARES}}'
  OPENBAO_INIT_THRESHOLD: '{{default "3" .OPENBAO_INIT_THRESHOLD}}'
  OPENBAO_AUTOUNSEAL_KEY_NAME: '{{default "autounseal" .OPENBAO_AUTOUNSEAL_KEY_NAME}}'
  OPENBAO_INSTALL_DIR: '{{default "/etc/openbao" .OPENBAO_INSTALL_DIR}}'
  OPENBAO_SYSTEMD_UNIT: '{{default "openbao" .OPENBAO_SYSTEMD_UNIT}}'
  OPENBAO_RELEASES_URL: 'https://github.com/openbao/openbao/releases/latest'

  DEBIAN_FRONTEND: noninteractive

tasks:
  default:
    desc: Show the available secrets tasks
    cmds:
      - task --taskfile {{.TASKFILE}} --list

  init:
    desc: Create the standard state/secrets directory layout
    cmds:
      - |
        set -eu
        mkdir -p \
          '{{.SECRETS_DIR}}' \
          '{{.TMP_DIR}}' \
          '{{.BIN_DIR}}' \
          '{{.AGE_DIR}}' \
          '{{.SECRETS_DIR}}/sops/examples' \
          '{{.OPENBAO_BOOTSTRAP_DIR}}' \
          '{{.OPENBAO_RUNTIME_DIR}}' \
          '{{.OPENBAO_POLICIES_DIR}}' \
          '{{.OPENBAO_RENDERED_DIR}}' \
          '{{.OPENBAO_CA_DIR}}' \
          '{{.OPENBAO_SERVER_TLS_DIR}}' \
          '{{.OPENBAO_TRANSIT_DIR}}' \
          '{{.OPENBAO_DATA_DIR}}'
        chmod 700 '{{.SECRETS_DIR}}' '{{.TMP_DIR}}' '{{.AGE_DIR}}' '{{.OPENBAO_BOOTSTRAP_DIR}}' '{{.OPENBAO_RUNTIME_DIR}}' '{{.OPENBAO_POLICIES_DIR}}' '{{.OPENBAO_CA_DIR}}' '{{.OPENBAO_SERVER_TLS_DIR}}' '{{.OPENBAO_TRANSIT_DIR}}'
        echo 'Initialised standard secrets directory layout under {{.SECRETS_DIR}}'

  tools:check:
    desc: Check the base tools required for repo-side secrets automation
    deps: [init]
    cmds:
      - |
        set -eu
        missing=0
        for tool in age-keygen age sops jq curl openssl sed awk sudo; do
          if ! command -v "$tool" >/dev/null 2>&1; then
            echo "Missing required tool: $tool" >&2
            missing=1
          fi
        done
        if command -v bao >/dev/null 2>&1; then
          bao version >/dev/null 2>&1 || true
        else
          echo 'Missing required tool: bao' >&2
          missing=1
        fi
        [ "$missing" -eq 0 ]

  tools:check:systemd:
    desc: Check whether systemd tooling is available for host-managed OpenBao runtime tasks
    cmds:
      - |
        set -eu
        command -v systemctl >/dev/null 2>&1
        command -v journalctl >/dev/null 2>&1
        echo 'systemd tooling is available'

  tools:install:base:
    desc: Install base packages required for secrets automation on Ubuntu/Debian
    cmds:
      - |
        set -eu
        sudo apt-get update
        sudo apt-get install -y age jq curl openssl sed gawk ca-certificates gnupg lsb-release

  tools:install:sops:
    desc: Install SOPS on Ubuntu/Debian when not already available
    preconditions:
      - sh: 'command -v sudo >/dev/null 2>&1'
        msg: 'sudo is required but not installed.'
    cmds:
      - |
        set -eu
        if command -v sops >/dev/null 2>&1; then
          echo 'sops is already installed'
          exit 0
        fi
        arch="$(dpkg --print-architecture)"
        version_url='https://github.com/getsops/sops/releases/latest'
        version="$(curl -fsSLI -o /dev/null -w '%{url_effective}' "$version_url" | sed 's#.*/tag/##; s#^v##')"
        pkg="sops_${version}_${arch}.deb"
        url="https://github.com/getsops/sops/releases/download/v${version}/${pkg}"
        curl -fL "$url" -o "/tmp/${pkg}"
        sudo apt-get install -y "/tmp/${pkg}"
        sops --version

  tools:install:openbao:
    desc: Install the latest OpenBao release on Ubuntu/Debian
    vars:
      ARCH:
        sh: |
          case "$(uname -m)" in
            x86_64|amd64) echo amd64 ;;
            aarch64|arm64) echo arm64 ;;
            *) echo unsupported ;;
          esac
      OPENBAO_VERSION:
        sh: |
          curl -fsSLI -o /dev/null -w '%{url_effective}' '{{.OPENBAO_RELEASES_URL}}' | sed 's#.*/tag/v##'
      PKG_FILE: 'openbao_{{.OPENBAO_VERSION}}_linux_{{.ARCH}}.deb'
      PKG_URL: 'https://github.com/openbao/openbao/releases/download/v{{.OPENBAO_VERSION}}/openbao_{{.OPENBAO_VERSION}}_linux_{{.ARCH}}.deb'
    preconditions:
      - sh: '[ "{{.ARCH}}" != "unsupported" ]'
        msg: 'Unsupported architecture. Only amd64 and arm64 are supported.'
      - sh: 'command -v curl >/dev/null 2>&1'
        msg: 'curl is required but not installed.'
      - sh: 'command -v sudo >/dev/null 2>&1'
        msg: 'sudo is required but not installed.'
      - sh: 'command -v sed >/dev/null 2>&1'
        msg: 'sed is required but not installed.'
      - sh: '[ -n "{{.OPENBAO_VERSION}}" ]'
        msg: 'Failed to resolve the latest OpenBao version from GitHub.'
    cmds:
      - "echo 'Resolved latest OpenBao version: {{.OPENBAO_VERSION}}'"
      - echo 'Downloading {{.PKG_FILE}}'
      - curl -fL '{{.PKG_URL}}' -o '/tmp/{{.PKG_FILE}}'
      - sudo apt-get update
      - sudo apt-get install -y '/tmp/{{.PKG_FILE}}'
      - bao version

  tools:install:
    desc: Install all required tools for the secrets standard
    cmds:
      - task: tools:install:base
      - task: tools:install:sops
      - task: tools:install:openbao
      - task: tools:check

  age:generate:
    desc: Generate standard admin and recovery age identities if missing
    deps: [init]
    cmds:
      - |
        set -eu
        if [ ! -f '{{.AGE_ADMIN_KEY}}' ]; then
          age-keygen -o '{{.AGE_ADMIN_KEY}}' >/dev/null
          age-keygen -y '{{.AGE_ADMIN_KEY}}' > '{{.AGE_ADMIN_PUB}}'
          chmod 600 '{{.AGE_ADMIN_KEY}}'
          chmod 644 '{{.AGE_ADMIN_PUB}}'
          echo 'Generated admin age identity'
        else
          echo 'Admin age identity already exists'
        fi
        if [ ! -f '{{.AGE_RECOVERY_KEY}}' ]; then
          age-keygen -o '{{.AGE_RECOVERY_KEY}}' >/dev/null
          age-keygen -y '{{.AGE_RECOVERY_KEY}}' > '{{.AGE_RECOVERY_PUB}}'
          chmod 600 '{{.AGE_RECOVERY_KEY}}'
          chmod 644 '{{.AGE_RECOVERY_PUB}}'
          echo 'Generated recovery age identity'
        else
          echo 'Recovery age identity already exists'
        fi
        cat '{{.AGE_ADMIN_KEY}}' '{{.AGE_RECOVERY_KEY}}' > '{{.AGE_KEYS_FILE}}'
        chmod 600 '{{.AGE_KEYS_FILE}}'

  age:show:recipients:
    desc: Show the public age recipients used by SOPS
    cmds:
      - |
        set -eu
        test -f '{{.AGE_ADMIN_PUB}}'
        test -f '{{.AGE_RECOVERY_PUB}}'
        echo 'admin='"$(cat '{{.AGE_ADMIN_PUB}}')"
        echo 'recovery='"$(cat '{{.AGE_RECOVERY_PUB}}')"

  age:backup:bundle:
    desc: Create a tar.gz backup bundle of age identities under state/secrets/backups
    deps: [age:generate]
    cmds:
      - |
        set -eu
        backup_dir='{{.SECRETS_DIR}}/backups'
        mkdir -p "$backup_dir"
        archive="$backup_dir/age-$(date -u +%Y%m%dT%H%M%SZ).tar.gz"
        tar -C '{{.SECRETS_DIR}}' -czf "$archive" age
        chmod 600 "$archive"
        echo "Created $archive"

  sops:config:render:
    desc: Render the repository SOPS configuration for state/secrets
    deps: [age:generate]
    cmds:
      - |
        set -eu
        admin="$(cat '{{.AGE_ADMIN_PUB}}')"
        recovery="$(cat '{{.AGE_RECOVERY_PUB}}')"
        cat > '{{.SOPS_CONFIG_FILE}}' <<EOF
        # ================================================================
        # File: {{.SOPS_CONFIG_FILE}}
        # Purpose:
        #   SOPS creation rules for secrets stored under state/secrets/
        # ================================================================
        creation_rules:
          - path_regex: ^state/secrets/.*\.(ya?ml|json|env|ini|txt|conf)$
            age: >-
              ${admin},${recovery}
        EOF
        echo 'Rendered {{.SOPS_CONFIG_FILE}}'

  sops:sample:create:
    desc: Create an example encrypted bootstrap secret file if missing
    deps: [sops:config:render]
    cmds:
      - |
        set -eu
        if [ -f '{{.SOPS_SAMPLE_FILE}}' ]; then
          echo 'Sample encrypted SOPS file already exists'
          exit 0
        fi
        mkdir -p '{{.TMP_DIR}}'
        cat > '{{.SOPS_SAMPLE_PLAIN_FILE}}' <<EOF
        # ================================================================
        # File: bootstrap.yaml
        # Purpose:
        #   Example bootstrap secret payload for SOPS testing.
        # ================================================================
        bootstrap:
          created_by: task
          created_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          note: replace-this-with-real-values
        EOF
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt --input-type yaml --output-type yaml '{{.SOPS_SAMPLE_PLAIN_FILE}}' > '{{.SOPS_SAMPLE_FILE}}'
        rm -f '{{.SOPS_SAMPLE_PLAIN_FILE}}'
        chmod 600 '{{.SOPS_SAMPLE_FILE}}'
        echo 'Created {{.SOPS_SAMPLE_FILE}}'

  sops:edit:
    desc: "Edit a SOPS-encrypted file. Usage: task sops:edit FILE=state/secrets/..."
    preconditions:
      - sh: '[ -n "{{.FILE}}" ]'
        msg: 'Provide FILE=state/secrets/...'
      - sh: '[ -f "{{.FILE}}" ]'
        msg: 'The requested encrypted file does not exist.'
    cmds:
      - SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops '{{.FILE}}'

  sops:encrypt:
    desc: "Encrypt a plaintext file in place. Usage: task sops:encrypt FILE=state/secrets/... PLAIN=path"
    preconditions:
      - sh: '[ -n "{{.FILE}}" ]'
        msg: 'Provide FILE=state/secrets/...'
      - sh: '[ -n "{{.PLAIN}}" ]'
        msg: 'Provide PLAIN=path/to/plaintext-file'
      - sh: '[ -f "{{.PLAIN}}" ]'
        msg: 'Plaintext source file does not exist.'
    cmds:
      - |
        set -eu
        mkdir -p "$(dirname '{{.FILE}}')"
        SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --encrypt '{{.PLAIN}}' > '{{.FILE}}'
        chmod 600 '{{.FILE}}'
        echo 'Encrypted {{.PLAIN}} to {{.FILE}}'

  sops:decrypt:
    desc: "Decrypt a SOPS file to stdout or OUT=path. Usage: task sops:decrypt FILE=... [OUT=...]"
    preconditions:
      - sh: '[ -n "{{.FILE}}" ]'
        msg: 'Provide FILE=state/secrets/...'
      - sh: '[ -f "{{.FILE}}" ]'
        msg: 'Encrypted source file does not exist.'
    cmds:
      - |
        set -eu
        if [ -n '{{.OUT}}' ]; then
          mkdir -p "$(dirname '{{.OUT}}')"
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.FILE}}' > '{{.OUT}}'
          chmod 600 '{{.OUT}}'
          echo 'Decrypted {{.FILE}} to {{.OUT}}'
        else
          SOPS_AGE_KEY_FILE='{{.AGE_KEYS_FILE}}' sops --decrypt '{{.FILE}}'
        fi

  sops:bootstrap:
    desc: Bootstrap age and SOPS standards and create an example encrypted secret
    cmds:
      - task: age:generate
      - task: sops:config:render
      - task: sops:sample:create

  openbao:tls:ca:init:
    desc: Generate a local CA for OpenBao TLS if missing
    deps: [init]
    cmds:
      - |
        set -eu
        if [ -f '{{.OPENBAO_CA_DIR}}/ca.key.pem' ] && [ -f '{{.OPENBAO_CA_DIR}}/ca.cert.pem' ]; then
          echo 'OpenBao CA already exists'
          exit 0
        fi
        openssl genrsa -out '{{.OPENBAO_CA_DIR}}/ca.key.pem' 4096
        openssl req -x509 -new -nodes \
          -key '{{.OPENBAO_CA_DIR}}/ca.key.pem' \
          -sha256 -days 3650 \
          -subj '/CN=homelab-openbao-ca' \
          -out '{{.OPENBAO_CA_DIR}}/ca.cert.pem'
        chmod 600 '{{.OPENBAO_CA_DIR}}/ca.key.pem'
        chmod 644 '{{.OPENBAO_CA_DIR}}/ca.cert.pem'
        echo 'Generated local OpenBao CA'

  openbao:tls:server:init:
    desc: Generate a TLS server certificate for OpenBao if missing
    deps: [openbao:tls:ca:init]
    cmds:
      - |
        set -eu
        if [ -f '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' ] && [ -f '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' ]; then
          echo 'OpenBao server TLS material already exists'
          exit 0
        fi
        dns_tmp='{{.TMP_DIR}}/dns_sans.txt'
        ip_tmp='{{.TMP_DIR}}/ip_sans.txt'
        mkdir -p '{{.TMP_DIR}}'
        printf '%s\n' '{{.OPENBAO_DNS_ALT_NAMES}}' | tr ',' '\n' | sed 's/^ *//; s/ *$//' | awk 'NF > 0 {print}' > "$dns_tmp"
        printf '%s\n' '{{.OPENBAO_IP_ALT_NAMES}}' | tr ',' '\n' | sed 's/^ *//; s/ *$//' | awk 'NF > 0 {print}' > "$ip_tmp"
        {
          echo '[req]'
          echo 'default_bits = 4096'
          echo 'prompt = no'
          echo 'default_md = sha256'
          echo 'distinguished_name = dn'
          echo 'req_extensions = req_ext'
          echo
          echo '[dn]'
          echo 'CN = {{.OPENBAO_HOST}}'
          echo
          echo '[req_ext]'
          echo 'subjectAltName = @alt_names'
          echo 'extendedKeyUsage = serverAuth'
          echo
          echo '[alt_names]'
          dns_index=1
          while IFS= read -r dns; do
            echo "DNS.${dns_index} = ${dns}"
            dns_index=$((dns_index + 1))
          done < "$dns_tmp"
          ip_index=1
          while IFS= read -r ip; do
            echo "IP.${ip_index} = ${ip}"
            ip_index=$((ip_index + 1))
          done < "$ip_tmp"
        } > '{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'
        openssl genrsa -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' 4096
        openssl req -new \
          -key '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' \
          -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' \
          -config '{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'
        openssl x509 -req \
          -in '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' \
          -CA '{{.OPENBAO_CA_DIR}}/ca.cert.pem' \
          -CAkey '{{.OPENBAO_CA_DIR}}/ca.key.pem' \
          -CAcreateserial \
          -out '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' \
          -days 825 \
          -sha256 \
          -extensions req_ext \
          -extfile '{{.OPENBAO_SERVER_TLS_DIR}}/server-openssl.cnf'
        chmod 600 '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem'
        chmod 644 '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem'
        rm -f '{{.OPENBAO_SERVER_TLS_DIR}}/server.csr.pem' "$dns_tmp" "$ip_tmp"
        echo 'Generated OpenBao server TLS material'

  openbao:policy:render:
    desc: Render standard OpenBao policies used by bootstrap and auto-unseal
    deps: [init]
    cmds:
      - |
        set -eu
        cat > '{{.OPENBAO_POLICY_AUTOUNSEAL}}' <<EOF
        # ================================================================
        # File: autounseal.hcl
        # Purpose:
        #   Policy for a token used to manage transit-backed auto-unseal.
        # ================================================================
        path "transit/encrypt/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["update"]
        }

        path "transit/decrypt/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["update"]
        }

        path "transit/keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}" {
          capabilities = ["read"]
        }
        EOF
        echo 'Rendered {{.OPENBAO_POLICY_AUTOUNSEAL}}'

  openbao:config:render:
    desc: Render standalone OpenBao configuration and environment files
    deps:
      - openbao:tls:server:init
      - openbao:policy:render
    cmds:
      - |
        set -eu
        cat > '{{.OPENBAO_CONFIG_FILE}}' <<EOF
        # ================================================================
        # File: openbao.hcl
        # Purpose:
        #   Standalone OpenBao server configuration using integrated Raft
        #   storage with TLS enabled for API and cluster traffic.
        # ================================================================
        ui = true
        api_addr = "{{.OPENBAO_API_ADDR}}"
        cluster_addr = "{{.OPENBAO_CLUSTER_ADDR}}"

        listener "tcp" {
          address = "0.0.0.0:{{.OPENBAO_PORT}}"
          cluster_address = "0.0.0.0:{{.OPENBAO_CLUSTER_PORT}}"
          tls_disable = 0
          tls_cert_file = "{{.OPENBAO_INSTALL_DIR}}/server.cert.pem"
          tls_key_file = "{{.OPENBAO_INSTALL_DIR}}/server.key.pem"
          tls_client_ca_file = "{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem"
        }

        storage "raft" {
          path = "{{.OPENBAO_DATA_DIR_ABS}}"
          node_id = "{{.OPENBAO_HOST}}"
        }

        telemetry {
          disable_hostname = true
          prometheus_retention_time = "24h"
        }
        EOF
        cat > '{{.OPENBAO_ENV_FILE}}' <<EOF
        # ================================================================
        # File: openbao.env
        # Purpose:
        #   Standard OpenBao CLI environment variables for this homelab.
        # ================================================================
        export BAO_ADDR='{{.OPENBAO_ADDR}}'
        export BAO_CACERT='{{.ROOT_DIR}}/{{.OPENBAO_CA_DIR}}/ca.cert.pem'
        export BAO_FORMAT='json'
        EOF
        chmod 600 '{{.OPENBAO_CONFIG_FILE}}' '{{.OPENBAO_ENV_FILE}}'
        echo 'Rendered OpenBao configuration and environment files'

  openbao:install:config:
    desc: Install the rendered OpenBao configuration into /etc/openbao
    deps: [openbao:config:render]
    cmds:
      - |
        set -eu
        sudo mkdir -p '{{.OPENBAO_INSTALL_DIR}}'
        sudo install -m 600 '{{.OPENBAO_CONFIG_FILE}}' '{{.OPENBAO_INSTALL_DIR}}/openbao.hcl'
        sudo install -m 644 '{{.OPENBAO_CA_DIR}}/ca.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/ca.cert.pem'
        sudo install -m 644 '{{.OPENBAO_SERVER_TLS_DIR}}/server.cert.pem' '{{.OPENBAO_INSTALL_DIR}}/server.cert.pem'
        sudo install -m 600 '{{.OPENBAO_SERVER_TLS_DIR}}/server.key.pem' '{{.OPENBAO_INSTALL_DIR}}/server.key.pem'
        echo 'Installed OpenBao configuration into {{.OPENBAO_INSTALL_DIR}}'

  openbao:systemd:render:
    desc: Render a hardened systemd unit for standalone OpenBao
    deps: [openbao:config:render]
    cmds:
      - |
        set -eu
        cat > '{{.OPENBAO_RENDERED_DIR}}/openbao.service' <<EOF
        # ================================================================
        # File: openbao.service
        # Purpose:
        #   systemd unit for a standalone OpenBao runtime.
        # ================================================================
        [Unit]
        Description=OpenBao secrets management server
        Documentation=https://openbao.org/docs/
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        User=openbao
        Group=openbao
        ExecStart=/usr/bin/bao server -config={{.OPENBAO_INSTALL_DIR}}/openbao.hcl
        ExecReload=/bin/kill --signal HUP $$MAINPID
        Restart=on-failure
        RestartSec=5
        LimitNOFILE=65536
        LimitMEMLOCK=infinity
        AmbientCapabilities=CAP_IPC_LOCK
        CapabilityBoundingSet=CAP_IPC_LOCK
        NoNewPrivileges=true
        PrivateTmp=true
        ProtectSystem=full
        ProtectHome=read-only
        ProtectKernelTunables=true
        ProtectKernelModules=true
        ProtectControlGroups=true
        ReadWritePaths={{.OPENBAO_INSTALL_DIR}} {{.OPENBAO_DATA_DIR_ABS}}
        WorkingDirectory={{.OPENBAO_DATA_DIR_ABS}}

        [Install]
        WantedBy=multi-user.target
        EOF
        chmod 600 '{{.OPENBAO_RENDERED_DIR}}/openbao.service'
        echo 'Rendered systemd unit for OpenBao'

  openbao:systemd:install:
    desc: Install the OpenBao systemd unit and ensure runtime paths exist
    deps:
      - tools:check:systemd
      - openbao:install:config
      - openbao:systemd:render
    cmds:
      - |
        set -eu
        if ! id openbao >/dev/null 2>&1; then
          sudo useradd --system --home '{{.OPENBAO_DATA_DIR_ABS}}' --shell /usr/sbin/nologin openbao
        fi
        sudo mkdir -p '{{.OPENBAO_DATA_DIR_ABS}}'
        sudo chown -R openbao:openbao '{{.OPENBAO_DATA_DIR_ABS}}' '{{.OPENBAO_INSTALL_DIR}}'
        sudo install -m 644 '{{.OPENBAO_RENDERED_DIR}}/openbao.service' '/etc/systemd/system/{{.OPENBAO_SYSTEMD_UNIT}}.service'
        sudo systemctl daemon-reload
        sudo systemctl enable '{{.OPENBAO_SYSTEMD_UNIT}}.service'
        echo 'Installed and enabled {{.OPENBAO_SYSTEMD_UNIT}}.service'

  openbao:start:
    desc: Start the OpenBao systemd service
    deps: [openbao:systemd:install]
    cmds:
      - sudo systemctl start '{{.OPENBAO_SYSTEMD_UNIT}}.service'
      - sudo systemctl --no-pager --full status '{{.OPENBAO_SYSTEMD_UNIT}}.service' || true

  openbao:stop:
    desc: Stop the OpenBao systemd service
    deps: [tools:check:systemd]
    cmds:
      - sudo systemctl stop '{{.OPENBAO_SYSTEMD_UNIT}}.service'

  openbao:restart:
    desc: Restart the OpenBao systemd service
    deps: [tools:check:systemd]
    cmds:
      - sudo systemctl restart '{{.OPENBAO_SYSTEMD_UNIT}}.service'
      - sudo systemctl --no-pager --full status '{{.OPENBAO_SYSTEMD_UNIT}}.service' || true

  openbao:logs:
    desc: Show recent OpenBao service logs
    deps: [tools:check:systemd]
    cmds:
      - "sudo journalctl -u '{{.OPENBAO_SYSTEMD_UNIT}}.service' -n '${LINES:-100}' --no-pager"

  openbao:status:
    desc: Show OpenBao seal and initialisation status
    deps: [openbao:config:render]
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_ENV_FILE}}'
        bao status | tee '{{.OPENBAO_STATUS_FILE}}'

  openbao:init:
    desc: Initialise OpenBao once and persist bootstrap outputs under state/secrets
    deps: [openbao:config:render]
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_ENV_FILE}}'
        if bao status >/dev/null 2>&1; then
          if bao status | jq -e '.initialized == true' >/dev/null 2>&1; then
            echo 'OpenBao is already initialised'
            exit 0
          fi
        fi
        bao operator init \
          -key-shares='{{.OPENBAO_INIT_SHARES}}' \
          -key-threshold='{{.OPENBAO_INIT_THRESHOLD}}' \
          -format=json > '{{.OPENBAO_INIT_FILE}}'
        jq '{unseal_keys_b64: .unseal_keys_b64, unseal_keys_hex: .unseal_keys_hex}' '{{.OPENBAO_INIT_FILE}}' > '{{.OPENBAO_KEYS_JSON}}'
        jq -r '.root_token' '{{.OPENBAO_INIT_FILE}}' > '{{.OPENBAO_ROOT_TOKEN_FILE}}'
        chmod 600 '{{.OPENBAO_INIT_FILE}}' '{{.OPENBAO_KEYS_JSON}}' '{{.OPENBAO_ROOT_TOKEN_FILE}}'
        echo 'Initialised OpenBao and persisted bootstrap outputs under {{.OPENBAO_BOOTSTRAP_DIR}}'

  openbao:unseal:
    desc: Unseal the standalone OpenBao instance using stored bootstrap keys
    deps: [openbao:init]
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_ENV_FILE}}'
        sealed="$(bao status | jq -r '.sealed')"
        if [ "$sealed" = 'false' ]; then
          echo 'OpenBao is already unsealed'
          exit 0
        fi
        jq -r '.unseal_keys_b64[0:{{.OPENBAO_INIT_THRESHOLD}}][]' '{{.OPENBAO_INIT_FILE}}' | while IFS= read -r key; do
          bao operator unseal "$key" >/dev/null
        done
        bao status

  openbao:login:root:
    desc: Print an export statement for the saved root token
    deps: [openbao:init]
    cmds:
      - |
        set -eu
        echo "export BAO_TOKEN='$(cat '{{.OPENBAO_ROOT_TOKEN_FILE}}')'"

  openbao:secrets:enable:
    desc: Enable baseline secret engines if not already enabled
    deps: [openbao:unseal]
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_ENV_FILE}}'
        export BAO_TOKEN="$(cat '{{.OPENBAO_ROOT_TOKEN_FILE}}')"
        bao secrets list -format=json | jq -e 'has("kv/")' >/dev/null 2>&1 || bao secrets enable -path=kv kv-v2
        bao secrets list -format=json | jq -e 'has("pki/")' >/dev/null 2>&1 || bao secrets enable pki
        bao secrets list -format=json | jq -e 'has("transit/")' >/dev/null 2>&1 || bao secrets enable transit
        echo 'Ensured kv, pki, and transit engines are enabled'

  openbao:transit:prepare-autounseal:
    desc: Create a transit key, policy, and orphan token for future auto-unseal use
    deps:
      - openbao:secrets:enable
      - openbao:policy:render
    cmds:
      - |
        set -eu
        . '{{.OPENBAO_ENV_FILE}}'
        export BAO_TOKEN="$(cat '{{.OPENBAO_ROOT_TOKEN_FILE}}')"
        bao read -format=json 'transit/keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}' >/dev/null 2>&1 || bao write -f 'transit/keys/{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}'
        bao policy read autounseal >/dev/null 2>&1 || bao policy write autounseal '{{.OPENBAO_POLICY_AUTOUNSEAL}}'
        if [ ! -f '{{.OPENBAO_TRANSIT_BOOTSTRAP_FILE}}' ]; then
          token="$(bao token create -orphan -policy=autounseal -format=json | jq -r '.auth.client_token')"
          jq -n \
            --arg token "$token" \
            --arg key_name '{{.OPENBAO_AUTOUNSEAL_KEY_NAME}}' \
            --arg address '{{.OPENBAO_ADDR}}' \
            --arg ca_cert '{{.OPENBAO_CA_DIR}}/ca.cert.pem' \
            '{token: $token, key_name: $key_name, address: $address, ca_cert: $ca_cert}' > '{{.OPENBAO_TRANSIT_BOOTSTRAP_FILE}}'
          chmod 600 '{{.OPENBAO_TRANSIT_BOOTSTRAP_FILE}}'
          echo 'Created transit auto-unseal bootstrap artefact'
        else
          echo 'Transit auto-unseal bootstrap artefact already exists'
        fi

  openbao:backup:bundle:
    desc: Create a tar.gz backup bundle of OpenBao bootstrap artefacts under state/secrets/backups
    deps: [openbao:init]
    cmds:
      - |
        set -eu
        backup_dir='{{.SECRETS_DIR}}/backups'
        mkdir -p "$backup_dir"
        archive="$backup_dir/openbao-bootstrap-$(date -u +%Y%m%dT%H%M%SZ).tar.gz"
        tar -C '{{.SECRETS_DIR}}' -czf "$archive" openbao/bootstrap openbao/tls age
        chmod 600 "$archive"
        echo "Created $archive"

  openbao:bootstrap:standalone:
    desc: End-to-end standalone OpenBao bootstrap with TLS, Raft, init, unseal, and baseline engines
    cmds:
      - task: init
      - task: tools:check
      - task: openbao:start
      - task: openbao:init
      - task: openbao:unseal
      - task: openbao:secrets:enable
      - task: openbao:transit:prepare-autounseal

  clean:tmp:
    desc: Remove temporary plaintext working files
    cmds:
      - |
        set -eu
        find '{{.TMP_DIR}}' -mindepth 1 -maxdepth 1 -type f -exec rm -f {} +
        echo 'Removed temporary files from {{.TMP_DIR}}'

  report:
    desc: Print a concise status report for the secrets standard
    cmds:
      - |
        set -eu
        echo '--- age ---'
        [ -f '{{.AGE_ADMIN_KEY}}' ] && echo 'admin identity: present' || echo 'admin identity: missing'
        [ -f '{{.AGE_RECOVERY_KEY}}' ] && echo 'recovery identity: present' || echo 'recovery identity: missing'
        echo '--- sops ---'
        [ -f '{{.SOPS_CONFIG_FILE}}' ] && echo '.sops.yaml: present' || echo '.sops.yaml: missing'
        [ -f '{{.SOPS_SAMPLE_FILE}}' ] && echo 'sample encrypted file: present' || echo 'sample encrypted file: missing'
        echo '--- openbao ---'
        [ -f '{{.OPENBAO_CONFIG_FILE}}' ] && echo 'config: present' || echo 'config: missing'
        [ -f '{{.OPENBAO_INIT_FILE}}' ] && echo 'initialisation artefact: present' || echo 'initialisation artefact: missing'
        [ -f '{{.OPENBAO_TRANSIT_BOOTSTRAP_FILE}}' ] && echo 'transit auto-unseal artefact: present' || echo 'transit auto-unseal artefact: missing'
