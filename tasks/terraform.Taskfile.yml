# ================================================================
# File: tasks/terraform.Taskfile.yml
# Purpose:
#   Terraform task wrappers for the Proxmox homelab stack.
#
# Notes:
#   - These tasks source the Proxmox API token created by
#     task proxmox:api-user from state/secrets/proxmox/proxmox-api-token.env.
#   - Proxmox host settings are sourced from state/configs/.env.
#   - Terraform variables are exported as TF_VAR_* values to keep
#     credentials out of Terraform files and CLI history.
#   - The Terraform stack ensures Ubuntu VM cloud images and Ubuntu
#     LXC templates are present in Proxmox before provisioning guests.
# ================================================================

version: '3'

silent: false

# includes:
#   secrets: ./secrets.Taskfile.yml
#   proxmox: ./proxmox.Taskfile.yml

vars:
  ROOT_DIR:
    sh: pwd
  TERRAFORM_DIR: '{{.ROOT_DIR}}/terraform/environments/lab'
  CONFIGS_DIR: '{{.ROOT_DIR}}/state/configs'
  ENV_FILE: '{{.CONFIGS_DIR}}/.env'
  SECRETS_DIR: '{{.ROOT_DIR}}/state/secrets'
  PROXMOX_DIR: '{{.SECRETS_DIR}}/proxmox'
  SSH_DIR: '{{.SECRETS_DIR}}/ssh'
  TOKEN_ENV_FILE: '{{.PROXMOX_DIR}}/proxmox-api-token.env'
  SSH_KEY_PATH: '{{.SSH_DIR}}/id_ed25519_homelab'
  DEFAULT_TERRAFORM_BIN: '{{default "terraform" .TERRAFORM_BIN}}'


tasks:
  terraform:check:
    desc: Check the local prerequisites for running the Proxmox Terraform stack
    deps:
      - secrets:init
      - proxmox:dirs
    cmds:
      - |
          set -euo pipefail
          missing=0
          for tool in {{.DEFAULT_TERRAFORM_BIN}} awk sed; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "Missing required Terraform tool: $tool" >&2
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]
          echo 'Terraform tooling is available'

  terraform:env:check:
    desc: Validate that the repo-managed Proxmox secret files exist for Terraform
    deps:
      - secrets:init
      - proxmox:dirs
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          ssh_key='{{.SSH_KEY_PATH}}'

          if [ ! -f "${env_file}" ]; then
            echo "Missing required Proxmox env file: ${env_file}" >&2
            echo 'Run: task proxmox:env:ensure' >&2
            exit 1
          fi

          if [ ! -f "${token_file}" ]; then
            echo "Missing required Proxmox token file: ${token_file}" >&2
            echo 'Run: task proxmox:api-user' >&2
            exit 1
          fi

          if [ ! -f "${ssh_key}" ]; then
            echo "Missing required SSH private key: ${ssh_key}" >&2
            echo 'Run: task secrets:ssh:keys' >&2
            exit 1
          fi

          echo 'Terraform secret inputs are present'

  terraform:init:
    desc: Initialise the Terraform Proxmox environment using repo-managed secrets
    deps:
      - terraform:check
      - terraform:env:check
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME:-${PROXMOX_HOST%%.*}}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path='{{.SSH_KEY_PATH}}'
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat '{{.SSH_KEY_PATH}}.pub')"

          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} init

  terraform:fmt:
    desc: Format the Terraform Proxmox stack
    deps:
      - terraform:check
    cmds:
      - |
          set -euo pipefail
          cd '{{.ROOT_DIR}}/terraform'
          {{.DEFAULT_TERRAFORM_BIN}} fmt -recursive

  terraform:validate:
    desc: Validate the Terraform Proxmox stack using repo-managed secrets
    deps:
      - terraform:init
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME:-${PROXMOX_HOST%%.*}}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path='{{.SSH_KEY_PATH}}'
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat '{{.SSH_KEY_PATH}}.pub')"

          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} validate

  terraform:plan:
    desc: Create a Terraform execution plan using repo-managed Proxmox secrets
    deps:
      - terraform:init
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME:-${PROXMOX_HOST%%.*}}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path='{{.SSH_KEY_PATH}}'
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat '{{.SSH_KEY_PATH}}.pub')"

          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} plan -out=tfplan

  terraform:apply:
    desc: Apply the Terraform Proxmox stack using repo-managed secrets
    deps:
      - terraform:init
    cmds:
      - |
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          terraform_dir='{{.TERRAFORM_DIR}}'

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          export TF_VAR_proxmox_endpoint="https://${PROXMOX_HOST}:8006/"
          export TF_VAR_proxmox_api_token="${PROXMOX_API_TOKEN}"
          export TF_VAR_proxmox_node_name="${PROXMOX_NODE_NAME:-${PROXMOX_HOST%%.*}}"
          export TF_VAR_proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-true}"
          export TF_VAR_proxmox_snippets_datastore="${PROXMOX_SNIPPETS_DATASTORE:-local}"
          export TF_VAR_proxmox_template_datastore="${PROXMOX_TEMPLATE_DATASTORE:-local}"
          export TF_VAR_proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-local-lvm}"
          export TF_VAR_proxmox_ssh_private_key_path='{{.SSH_KEY_PATH}}'
          export TF_VAR_proxmox_ssh_user="${PROXMOX_SSH_USER:-root}"
          export TF_VAR_vm_ssh_public_key="$(cat '{{.SSH_KEY_PATH}}.pub')"

          cd "${terraform_dir}"
          {{.DEFAULT_TERRAFORM_BIN}} apply
