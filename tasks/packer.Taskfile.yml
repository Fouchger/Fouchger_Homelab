# ###########################################################################
# File: tasks/packer.Taskfile.yml
# Purpose:
#   Use packer to create Proxmox VM templates.
#
# Scope:
#   - Initialise packer configuration.
#   - Generate packer variable file from locally stored Proxmox API token data.
#   - Build Debian 13 Proxmox templates.
#
# Notes:
#   - Expects state/secrets/proxmox/proxmox-api-token.env to exist locally.
#   - Writes packer/packer.pkrvars.hcl for packer consumption.
#   - Keeps Proxmox credential sourcing within the local admin workstation flow.
# ###########################################################################

version: '3'

silent: true

vars:
  PACKER_DIR: 'packer'
  PACKER_CONFIG_FILE: '{{.PACKER_DIR}}/config.pkr.hcl'
  PROXMOX_ENV_FILE: 'state/secrets/proxmox/proxmox-api-token.env'
  PACKER_VARS_FILE: '{{.PACKER_DIR}}/packer.pkrvars.hcl'

tasks:
  packer:init:
    desc: "Generate packer vars from Proxmox token env and initialise packer"
    cmds:
      - |
        set -a
        . {{.PROXMOX_ENV_FILE}}
        set +a

        cat > {{.PACKER_VARS_FILE}} <<EOF
        # ####################################################################
        # File: {{.PACKER_VARS_FILE}}
        # Purpose:
        #   Local Packer variable file generated from Proxmox API token secrets.
        #
        # Notes:
        #   - Auto-generated by task packer:init.
        #   - Do not commit if it contains live credentials.
        # ####################################################################
        proxmox_user = "${PROXMOX_API_USER}"
        proxmox_token =  "${PROXMOX_API_TOKEN_VALUE}"
        node = "${PROXMOX_HOST}"
        proxmox_host = "${PROXMOX_HOST_IP}:8006"
        proxmox_insecure_tls = true
        iso_download_pve = true
        EOF

        packer init {{.PACKER_CONFIG_FILE}}

  packer:build:debian13:
    desc: "Build Debian 13 Proxmox template with packer"
    dir: '{{.PACKER_DIR}}'
    cmds:
      - |
        packer build -var-file="debian-13.pkrvars.hcl" -var-file=packer.pkrvars.hcl .