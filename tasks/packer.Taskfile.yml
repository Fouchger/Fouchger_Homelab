# ================================================================
# File: tasks/packer.Taskfile.yml
# Purpose:
#   Manage curated Packer-based Proxmox template builds for the homelab.
#
# Notes:
#   - Uses the upstream proxmox-packer-templates pattern as a curated base.
#   - Renders local-only build variables from repo bootstrap state files.
#   - Keeps template creation separate from normal Terraform applies.
# ================================================================

version: '3'

vars:
  ROOT_DIR: '{{.ROOT_DIR | default .USER_WORKING_DIR}}'
  STATE_DIR: '{{.STATE_DIR | default (printf "%s/state" .ROOT_DIR)}}'
  CONFIGS_DIR: '{{.CONFIGS_DIR | default (printf "%s/configs" .STATE_DIR)}}'
  SECRETS_DIR: '{{.SECRETS_DIR | default (printf "%s/secrets" .STATE_DIR)}}'
  PROXMOX_SECRETS_DIR: '{{.PROXMOX_SECRETS_DIR | default (printf "%s/proxmox" .SECRETS_DIR)}}'
  ENV_FILE: '{{.ENV_FILE | default (printf "%s/.env" .CONFIGS_DIR)}}'
  TOKEN_ENV_FILE: '{{.TOKEN_ENV_FILE | default (printf "%s/proxmox-api-token.env" .PROXMOX_SECRETS_DIR)}}'
  PACKER_DIR: '{{.PACKER_DIR | default (printf "%s/packer" .ROOT_DIR)}}'
  PACKER_AUTO_VARS_FILE: '{{.PACKER_AUTO_VARS_FILE | default (printf "%s/local.auto.pkrvars.hcl" .PACKER_DIR)}}'
  DEFAULT_PROXMOX_API_PORT: '{{.DEFAULT_PROXMOX_API_PORT | default "8006"}}'
  DEFAULT_PROXMOX_INSECURE_TLS: '{{.DEFAULT_PROXMOX_INSECURE_TLS | default "true"}}'
  DEFAULT_PROXMOX_RESOURCE_POOL: '{{.DEFAULT_PROXMOX_RESOURCE_POOL | default ""}}'
  DEFAULT_PROXMOX_ISO_DATASTORE: '{{.DEFAULT_PROXMOX_ISO_DATASTORE | default "local"}}'
  DEFAULT_PROXMOX_VM_DATASTORE: '{{.DEFAULT_PROXMOX_VM_DATASTORE | default "local-lvm"}}'
  DEFAULT_PROXMOX_CLOUDINIT_DATASTORE: '{{.DEFAULT_PROXMOX_CLOUDINIT_DATASTORE | default "local-lvm"}}'
  DEFAULT_PROXMOX_NETWORK_BRIDGE: '{{.DEFAULT_PROXMOX_NETWORK_BRIDGE | default "vmbr0"}}'
  DEFAULT_UBUNTU22_PACKER_TEMPLATE_ID: '{{.DEFAULT_UBUNTU22_PACKER_TEMPLATE_ID | default "9103"}}'
  DEFAULT_UBUNTU24_PACKER_TEMPLATE_ID: '{{.DEFAULT_UBUNTU24_PACKER_TEMPLATE_ID | default "9102"}}'
  DEFAULT_UBUNTU25_PACKER_TEMPLATE_ID: '{{.DEFAULT_UBUNTU25_PACKER_TEMPLATE_ID | default "9104"}}'
  DEFAULT_ROCKY9_PACKER_TEMPLATE_ID: '{{.DEFAULT_ROCKY9_PACKER_TEMPLATE_ID | default "9101"}}'
  DEFAULT_ROCKY10_PACKER_TEMPLATE_ID: '{{.DEFAULT_ROCKY10_PACKER_TEMPLATE_ID | default "9105"}}'
  DEFAULT_TALOS112_PACKER_TEMPLATE_ID: '{{.DEFAULT_TALOS112_PACKER_TEMPLATE_ID | default "9112"}}'
  DEFAULT_OPNSENSE257_PACKER_TEMPLATE_ID: '{{.DEFAULT_OPNSENSE257_PACKER_TEMPLATE_ID | default "9125"}}'
  DEFAULT_OPNSENSE261_PACKER_TEMPLATE_ID: '{{.DEFAULT_OPNSENSE261_PACKER_TEMPLATE_ID | default "9126"}}'
  DEFAULT_ALPINE321_PACKER_TEMPLATE_ID: '{{.DEFAULT_ALPINE321_PACKER_TEMPLATE_ID | default "9131"}}'
  DEFAULT_ALPINE322_PACKER_TEMPLATE_ID: '{{.DEFAULT_ALPINE322_PACKER_TEMPLATE_ID | default "9132"}}'
  DEFAULT_WINDOWS_SERVER2022_PACKER_TEMPLATE_ID: '{{.DEFAULT_WINDOWS_SERVER2022_PACKER_TEMPLATE_ID | default "9142"}}'
  DEFAULT_WINDOWS_SERVER2025_PACKER_TEMPLATE_ID: '{{.DEFAULT_WINDOWS_SERVER2025_PACKER_TEMPLATE_ID | default "9145"}}'
  DEFAULT_WINDOWS11_PACKER_TEMPLATE_ID: '{{.DEFAULT_WINDOWS11_PACKER_TEMPLATE_ID | default "9111"}}'


tasks:
  packer:check:
    desc: Check that Packer is installed locally
    cmds:
      - command -v packer >/dev/null 2>&1
      - packer version

  packer:vars:render:
    desc: Render local-only Packer variables from bootstrap state files
    cmds:
      - task: packer:check
      - |
          # ================================================================
          # Task: packer:vars:render
          # Purpose:
          #   Render environment-specific Packer variables into a local-only
          #   auto-loaded file under packer/local.auto.pkrvars.hcl.
          #
          # Notes:
          #   - Sources state/configs/.env and state/secrets/proxmox token env.
          #   - Keeps API tokens and node-specific values out of version control.
          # ================================================================
          set -euo pipefail

          env_file='{{.ENV_FILE}}'
          token_file='{{.TOKEN_ENV_FILE}}'
          output_file='{{.PACKER_AUTO_VARS_FILE}}'

          if [ ! -f "${env_file}" ]; then
            echo "Required env file not found: ${env_file}" >&2
            exit 1
          fi

          if [ ! -f "${token_file}" ]; then
            echo "Required token file not found: ${token_file}" >&2
            echo 'Run: task proxmox:api-user' >&2
            exit 1
          fi

          # shellcheck disable=SC1090
          . "${env_file}"
          # shellcheck disable=SC1090
          . "${token_file}"

          : "${PROXMOX_NODE_NAME:?PROXMOX_NODE_NAME must be set in ${env_file}}"
          : "${PROXMOX_API_USER:?PROXMOX_API_USER must be set in ${token_file}}"
          : "${PROXMOX_API_TOKEN:?PROXMOX_API_TOKEN must be set in ${token_file}}"

          proxmox_host_raw="${PROXMOX_HOST:-${PROXMOX_HOST_IP:-}}"
          if [ -z "${proxmox_host_raw}" ]; then
            echo "PROXMOX_HOST or PROXMOX_HOST_IP must be set in ${env_file}" >&2
            exit 1
          fi

          case "${proxmox_host_raw}" in
            *:*) proxmox_host_api="${proxmox_host_raw}" ;;
            *) proxmox_host_api="${proxmox_host_raw}:{{.DEFAULT_PROXMOX_API_PORT}}" ;;
          esac

          proxmox_insecure_tls="${PROXMOX_INSECURE_TLS:-{{.DEFAULT_PROXMOX_INSECURE_TLS}}}"
          proxmox_iso_datastore="${PROXMOX_TEMPLATE_DATASTORE:-{{.DEFAULT_PROXMOX_ISO_DATASTORE}}}"
          proxmox_vm_datastore="${PROXMOX_VM_DATASTORE:-{{.DEFAULT_PROXMOX_VM_DATASTORE}}}"
          proxmox_cloudinit_datastore="${PROXMOX_VM_DATASTORE:-{{.DEFAULT_PROXMOX_CLOUDINIT_DATASTORE}}}"
          proxmox_network_bridge="${PROXMOX_NETWORK_BRIDGE:-{{.DEFAULT_PROXMOX_NETWORK_BRIDGE}}}"
          proxmox_resource_pool="${PROXMOX_RESOURCE_POOL:-{{.DEFAULT_PROXMOX_RESOURCE_POOL}}}"

          mkdir -p "$(dirname "${output_file}")"
          cat > "${output_file}" <<EOF
// ================================================================
// File: packer/local.auto.pkrvars.hcl
// Purpose:
//   Local-only rendered variables for curated Proxmox Packer builds.
//
// Notes:
//   - Generated by task packer:vars:render.
//   - Contains environment-specific values and must not be committed.
// ================================================================

proxmox_host              = "${proxmox_host_api}"
proxmox_user              = "${PROXMOX_API_USER}"
proxmox_token             = "${PROXMOX_API_TOKEN}"
proxmox_insecure_tls      = ${proxmox_insecure_tls}
node                      = "${PROXMOX_NODE_NAME}"
pool                      = "${proxmox_resource_pool}"
disk_storage_pool         = "${proxmox_vm_datastore}"
iso_storage_pool          = "${proxmox_iso_datastore}"
cloud_init_storage_pool   = "${proxmox_cloudinit_datastore}"
network_adapter           = "${proxmox_network_bridge}"
EOF

          echo "Rendered ${output_file}"

  packer:init:
    desc: Initialise the Proxmox Packer plugin in the curated packer workspace
    cmds:
      - task: packer:vars:render
      - cd '{{.PACKER_DIR}}' && packer init config.pkr.hcl

  packer:validate:ubuntu22:
    desc: Validate the curated Ubuntu 22.04 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=ubuntu-22.04.pkrvars.hcl .

  packer:validate:ubuntu24:
    desc: Validate the curated Ubuntu 24.04 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=ubuntu-24.04.pkrvars.hcl .

  packer:validate:ubuntu25:
    desc: Validate the curated Ubuntu 25.04 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=ubuntu-25.04.pkrvars.hcl .

  packer:validate:rocky9:
    desc: Validate the curated Rocky Linux 9 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=rocky-9.pkrvars.hcl .

  packer:validate:rocky10:
    desc: Validate the curated Rocky Linux 10 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=rocky-10.pkrvars.hcl .

  packer:validate:talos112:
    desc: Validate the curated Talos Linux 1.12 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=talos-1.12.pkrvars.hcl .

  packer:validate:opnsense257:
    desc: Validate the curated OPNsense 25.7 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=opnsense-25.7.pkrvars.hcl .

  packer:validate:opnsense261:
    desc: Validate the curated OPNsense 26.1 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=opnsense-26.1.pkrvars.hcl .

  packer:validate:alpine321:
    desc: Validate the curated Alpine Linux 3.21 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=alpine-3.21.pkrvars.hcl .

  packer:validate:alpine322:
    desc: Validate the curated Alpine Linux 3.22 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=alpine-3.22.pkrvars.hcl .

  packer:validate:windows-server2022:
    desc: Validate the curated Windows Server 2022 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=windows-server-2022.pkrvars.hcl .

  packer:validate:windows-server2025:
    desc: Validate the curated Windows Server 2025 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=windows-server-2025.pkrvars.hcl .

  packer:validate:windows11:
    desc: Validate the curated Windows 11 Proxmox template definition
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer validate -var-file=windows-11.pkrvars.hcl .

  packer:validate:
    desc: Validate the full curated Packer workspace
    cmds:
      - task: packer:validate:ubuntu22
      - task: packer:validate:ubuntu24
      - task: packer:validate:ubuntu25
      - task: packer:validate:rocky9
      - task: packer:validate:rocky10
      - task: packer:validate:talos112
      - task: packer:validate:opnsense257
      - task: packer:validate:opnsense261
      - task: packer:validate:alpine321
      - task: packer:validate:alpine322
      - task: packer:validate:windows-server2022
      - task: packer:validate:windows-server2025
      - task: packer:validate:windows11

  packer:build:ubuntu22:
    desc: Build the curated Ubuntu 22.04 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${UBUNTU22_PACKER_TEMPLATE_ID:-{{.DEFAULT_UBUNTU22_PACKER_TEMPLATE_ID}}} -var-file=ubuntu-22.04.pkrvars.hcl .

  packer:build:ubuntu24:
    desc: Build the curated Ubuntu 24.04 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${UBUNTU24_PACKER_TEMPLATE_ID:-{{.DEFAULT_UBUNTU24_PACKER_TEMPLATE_ID}}} -var-file=ubuntu-24.04.pkrvars.hcl .

  packer:build:ubuntu25:
    desc: Build the curated Ubuntu 25.04 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${UBUNTU25_PACKER_TEMPLATE_ID:-{{.DEFAULT_UBUNTU25_PACKER_TEMPLATE_ID}}} -var-file=ubuntu-25.04.pkrvars.hcl .

  packer:build:rocky9:
    desc: Build the curated Rocky Linux 9 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${ROCKY9_PACKER_TEMPLATE_ID:-{{.DEFAULT_ROCKY9_PACKER_TEMPLATE_ID}}} -var-file=rocky-9.pkrvars.hcl .

  packer:build:rocky10:
    desc: Build the curated Rocky Linux 10 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${ROCKY10_PACKER_TEMPLATE_ID:-{{.DEFAULT_ROCKY10_PACKER_TEMPLATE_ID}}} -var-file=rocky-10.pkrvars.hcl .

  packer:build:talos112:
    desc: Build the curated Talos Linux 1.12 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${TALOS112_PACKER_TEMPLATE_ID:-{{.DEFAULT_TALOS112_PACKER_TEMPLATE_ID}}} -var-file=talos-1.12.pkrvars.hcl .

  packer:build:opnsense257:
    desc: Build the curated OPNsense 25.7 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${OPNSENSE257_PACKER_TEMPLATE_ID:-{{.DEFAULT_OPNSENSE257_PACKER_TEMPLATE_ID}}} -var-file=opnsense-25.7.pkrvars.hcl .

  packer:build:opnsense261:
    desc: Build the curated OPNsense 26.1 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${OPNSENSE261_PACKER_TEMPLATE_ID:-{{.DEFAULT_OPNSENSE261_PACKER_TEMPLATE_ID}}} -var-file=opnsense-26.1.pkrvars.hcl .

  packer:build:alpine321:
    desc: Build the curated Alpine Linux 3.21 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${ALPINE321_PACKER_TEMPLATE_ID:-{{.DEFAULT_ALPINE321_PACKER_TEMPLATE_ID}}} -var-file=alpine-3.21.pkrvars.hcl .

  packer:build:alpine322:
    desc: Build the curated Alpine Linux 3.22 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${ALPINE322_PACKER_TEMPLATE_ID:-{{.DEFAULT_ALPINE322_PACKER_TEMPLATE_ID}}} -var-file=alpine-3.22.pkrvars.hcl .

  packer:build:windows-server2022:
    desc: Build the curated Windows Server 2022 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${WINDOWS_SERVER2022_PACKER_TEMPLATE_ID:-{{.DEFAULT_WINDOWS_SERVER2022_PACKER_TEMPLATE_ID}}} -var-file=windows-server-2022.pkrvars.hcl .

  packer:build:windows-server2025:
    desc: Build the curated Windows Server 2025 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${WINDOWS_SERVER2025_PACKER_TEMPLATE_ID:-{{.DEFAULT_WINDOWS_SERVER2025_PACKER_TEMPLATE_ID}}} -var-file=windows-server-2025.pkrvars.hcl .

  packer:build:windows11:
    desc: Build the curated Windows 11 Proxmox VM template
    cmds:
      - task: packer:init
      - cd '{{.PACKER_DIR}}' && packer build -var vmid=${WINDOWS11_PACKER_TEMPLATE_ID:-{{.DEFAULT_WINDOWS11_PACKER_TEMPLATE_ID}}} -var-file=windows-11.pkrvars.hcl .

  packer:build:linux-core:
    desc: Build the core Linux template set used most often in the homelab
    cmds:
      - task: packer:build:ubuntu24
      - task: packer:build:rocky9

  packer:build:all:
    desc: Build the full curated Proxmox template catalogue
    cmds:
      - task: packer:build:ubuntu22
      - task: packer:build:ubuntu24
      - task: packer:build:ubuntu25
      - task: packer:build:rocky9
      - task: packer:build:rocky10
      - task: packer:build:talos112
      - task: packer:build:opnsense257
      - task: packer:build:opnsense261
      - task: packer:build:alpine321
      - task: packer:build:alpine322
      - task: packer:build:windows-server2022
      - task: packer:build:windows-server2025
      - task: packer:build:windows11
