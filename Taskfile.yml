# ================================================================
# File: Taskfile.yml
# Purpose:
#   Root Task entry point for the homelab repository.
# Notes:
#   - Domain task files are included under namespaces.
# ================================================================
version: '3'

silent: true

dotenv:
  - state/config/.env

vars:
  ROOT_DIR: '{{.ROOT_DIR | default "."}}'

  CONFIG_DIR: '{{.ROOT_DIR}}/state/config'
  CONFIG_ENV_FILE: '{{.CONFIG_DIR}}/.env'

  SECRETS_DIR: '{{.ROOT_DIR}}/state/secrets'
  TMP_DIR: '{{.SECRETS_DIR}}/.tmp'
  BACKUP_DIR: '{{.SECRETS_DIR}}/backups'
  DR_DIR: '{{.SECRETS_DIR}}/dr'
  AUDIT_DIR: '{{.SECRETS_DIR}}/audit'

  AGE_DIR: '{{.SECRETS_DIR}}/age'
  AGE_KEYS_FILE: '{{.AGE_DIR}}/keys.txt'
  AGE_ARCHIVE_DIR: '{{.AGE_DIR}}/archive'

  PASSWORDS_DIR: '{{.SECRETS_DIR}}/passwords'
  PASSWORDS_ENC_ENV_FILE: '{{.PASSWORDS_DIR}}/passwords.enc.env'
  PASSWORDS_ENC_ENV_FILE_REL: 'state/secrets/passwords/passwords.enc.env'

  TASK_HELPERS_FILE: '{{.ROOT_DIR}}/scripts/task-helpers/secrets.sh'
  DEBIAN_FRONTEND: '{{.DEBIAN_FRONTEND | default "noninteractive"}}'

includes:
  secrets: ./taskfile/secrets.Taskfile.yml
  git_gh: ./taskfile/git_gh.Taskfile.yml
  ssh: ./taskfile/ssh.Taskfile.yml
  apps: ./taskfile/apps.Taskfile.yml
  proxmox: ./taskfile/proxmox.Taskfile.yml
  proxmox_vm: ./taskfile/proxmox_vm.Taskfile.yml
  proxmox_scripts: ./taskfile/proxmox_scripts.Taskfile.yml

tasks:
  help:
    desc: Show the top-level homelab operator menu
    cmds:
      - |
        cat <<'EOF'

        ----- Homelab root tasks -----

        Secrets:
          Setup:
            task secrets:bootstrap                    Full end-to-end secrets bootstrap
            task secrets:prepare                      Prepare tooling, SOPS, and OpenBao runtime
            task secrets:report                       Show the secrets status summary
            task secrets:design                       Show the secrets design and required inputs

          Useful day-to-day:
            task secrets:secret:update                Add or update a secret
            task secrets:secret:view                  View a specific secret
            task secrets:view:group                   View all secrets in a group
            task secrets:view:all                     List all encrypted secret files
            task secrets:edit                         Interactively choose and edit an encrypted file
            task secrets:edit FILE=state/secrets/...  Edit a specific encrypted file directly

          Operations:
            task secrets:openbao:status               Show OpenBao status
            task secrets:openbao:restart:validate     Restart and validate OpenBao
            task secrets:backup:offline               Create an offline recovery bundle
            task secrets:backup:raft                  Save a fresh OpenBao raft snapshot
            task secrets:ops:rotate:keys              Rotate age keys and rekey SOPS files
            task secrets:ops:renew:certs              Renew OpenBao certificates
            task secrets:ops:audit                    Generate an audit report

          Destructive:
            task secrets:destroy CONFIRM_DESTROY=true Remove secrets runtime and state
            task secrets:purge CONFIRM_DESTROY=true   Remove all secrets tooling and state

        Git and GitHub:
          Setup:
            task git_gh:bootstrap                     Install, configure, authenticate, and report
            task git_gh:install                       Install git and GitHub CLI when missing

          Identity and auth:
            task git_gh:config:git                    Configure git user.name and user.email
            task git_gh:auth:gh                       Store GitHub token and authenticate gh
            task git_gh:auth:git                      Configure git to use gh credentials
            task git_gh:report                        Show Git and GitHub status summary

        SSH and Proxmox access:
          Setup:
            task ssh:bootstrap                        Full first-time SSH and Proxmox access bootstrap
            task ssh:help                             Show the SSH task menu
            task ssh:report                           Show the SSH and Proxmox connection summary

          Identity and trust:
            task ssh:generate                         Generate the local Ed25519 SSH key if missing
            task ssh:show-public                      Show the local public key
            task ssh:known-hosts:trust:proxmox        Scan, verify, and trust the Proxmox host key
            task ssh:key:add:proxmox                  Add the local public key to the Proxmox host

          known_hosts operations:
            task ssh:known-hosts:reconcile            Clean stale local known_hosts entries
            task ssh:known-hosts:reconcile:remote     Clean known_hosts on the current remote host
            task ssh:known-hosts:reconcile:proxmox    Run remote known_hosts cleanup on the Proxmox host

          Destructive:
            task ssh:delete-identity                  Remove the managed local SSH identity

        Proxmox automation:
          Setup:
            task proxmox:bootstrap                    Full Proxmox automation bootstrap
            task proxmox:help                         Show the Proxmox automation task menu
            task proxmox:report                       Show the Proxmox automation status summary

          Identity and API:
            task proxmox:api:ensure                   Reconcile Proxmox automation role, user, ACL, and token
            task proxmox:node:discover                Discover and persist Proxmox node metadata

        Proxmox VM workflows:
          Setup:
            task proxmox_vm:help                      Show the Proxmox VM workflow task menu
            task proxmox_vm:inventory:report          Show the current VM inventory file path

          Workflow building blocks:
            task proxmox_vm:password:ensure           Ensure a named VM bootstrap password exists
            task proxmox_vm:inventory:update          Update the local Ansible inventory for a VM
            task proxmox_vm:workflow:run              Upload and run a VM workflow on Proxmox
            task proxmox_vm:create:standard           Standard template for a server-specific VM task
            task proxmox_vm:inventory:ips:refresh     Refresh ansible_host values for all inventory hosts using Proxmox and local discovery

          VM Creation:
            task proxmox_scripts:mikrotik-routeros    Create or reconcile the MikroTik RouterOS CHR VM
            task proxmox_scripts:opnsense             Create or reconcile the OPNsense VM

        Applications:
          Setup:
            task apps:bootstrap                       Install the core host applications
            task apps:tasklist                        Show available application install tasks

          Individual installs:
            task apps:code-server                     Install code-server
            task apps:python3                         Install Python 3
            task apps:pipx                            Install pipx
            task apps:ansible                         Install Ansible
            task apps:ansible:collections             Install Ansible collections
            task apps:terraform                       Install Terraform
            task apps:packer                          Install Packer
            task apps:openssl                         Install OpenSSL
            task apps:arp-scan                        Install arp-scan

          Reporting:
            task apps:status                          Show installed application status

        ----- End -----

        EOF

  default:
    desc: Show the top-level help menu
    cmds:
      - task: help

  day1:
    desc: Run the first-day homelab bootstrap flow
    cmds:
      - task: secrets:bootstrap
      - task: git_gh:bootstrap
      - task: ssh:bootstrap
      - task: apps:bootstrap
      - task: proxmox:bootstrap