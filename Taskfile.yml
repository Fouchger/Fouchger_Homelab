# ================================================================
# File: Taskfile.yml
# Purpose:
#   Root Taskfile entry point for the homelab repository.
#
# Notes:
#   - Includes reusable task sets for secrets, Proxmox, Terraform, and Ansible.
#   - Provides service-oriented aliases for identity platform deployment.
# ================================================================

version: '3'

silent: false

includes:
  secrets:
    taskfile: ./tasks/secrets.Taskfile.yml
    flatten: true
  git_gh:
    taskfile: ./tasks/git_gh.Taskfile.yml
    flatten: true
  proxmox: 
    taskfile: ./tasks/proxmox.Taskfile.yml
    flatten: true
  apps:
    taskfile: ./tasks/apps.Taskfile.yml
    flatten: true
  ssh:
    taskfile: ./tasks/ssh.Taskfile.yml
    flatten: true

tasks:
  default:
    desc: Show the available secrets tasks
    cmds:
      - task --taskfile {{.TASKFILE}} --list

  proxmox_discover:
    desc: Discover and persist Proxmox node metadata into state/configs/.env
    cmds:
      - task: proxmox:discover

  day1:
    desc: Complete day-1 secrets bootstrap for the homelab
    cmds:
      - task: secrets:init
      - task: tools:install
      - task: sops:bootstrap
      - task: openbao:bootstrap:standalone
      - task: secrets:clean:tmp
      - task: secrets:report
      - task: ssh:all
      - task: git_gh:bootstrap
      - task: proxmox:api-user
      - task: apps:upgrade
      - task: apps:python3
      - task: apps:pipx
      - task: apps:ansible
      - task: apps:terraform
      - task: apps:packer

  git_gh::setup:
    desc: Install git and gh, authenticate gh, configure Git auth, and install code-server
    cmds:
      - task: git_gh:bootstrap

  proxmox_bootstrap:
    desc: Bootstrap the Proxmox automation user, ACL, and API token
    cmds:
      - task: proxmox:api-user
