# ================================================================
# File: Taskfile.yml
# Purpose:
#   Root Taskfile entry point for the homelab repository.
# Notes:
#   - Includes the reusable secrets task set.
#   - Extend this file with additional domain Taskfiles over time.
# ================================================================

version: '3'

includes:
  secrets:
    taskfile: ./tasks/secrets.Taskfile.yml
    flatten: true
  git_gh:
    taskfile: ./tasks/git_gh.Taskfile.yml
    flatten: true  


tasks:
  all:
    desc: Run the standard homelab bootstrap tasks
    cmds:
      - task: init
      - task: tools:check
      - task: sops:bootstrap
      - task: openbao:config:render

  day1:
    desc: Complete day-1 secrets bootstrap for the homelab
    cmds:
      - task: init
      - task: tools:install
      - task: sops:bootstrap
      - task: openbao:bootstrap:standalone
      - task: report

  dev_setup:
    desc: Install git + gh (if needed), authenticate gh (Fine-grained PAT), and set up git auth via gh
    cmds:
      - task: install
      - task: auth
      - task code-server
      