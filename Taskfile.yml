# ================================================================
# File: Taskfile.yml
# Purpose:
#   Root Taskfile entry point for the homelab repository.
#
# Notes:
#   - Includes reusable task sets for secrets, Proxmox, Terraform, and Ansible.
#   - Provides service-oriented aliases for identity platform deployment.
# ================================================================

version: '3'

silent: false

includes:
  secrets:
    taskfile: ./tasks/secrets.Taskfile.yml
    flatten: true
  git_gh:
    taskfile: ./tasks/git_gh.Taskfile.yml
    flatten: true
  proxmox:
    taskfile: ./tasks/proxmox.Taskfile.yml
    flatten: true
  terraform:
    taskfile: ./tasks/terraform.Taskfile.yml
    flatten: true
  ansible:
    taskfile: ./tasks/ansible.Taskfile.yml
    flatten: true
  bootstrap_tasks:
    taskfile: ./tasks/bootstrap.Taskfile.yml
    flatten: false

tasks:
  day1:
    desc: Complete day-1 secrets bootstrap for the homelab
    cmds:
      - task: init
      - task: tools:install
      - task: sops:bootstrap
      - task: openbao:bootstrap:standalone
      - task: report
      - task: ssh:keys
      - task: install
      - task: auth
      - task: code-server
      - task: proxmox:api-user
      - task: bootstrap_tasks:upgrade
      - task: bootstrap_tasks:python3
      - task: bootstrap_tasks:pipx
      - task: bootstrap_tasks:ansible
      - task: bootstrap_tasks:terraform
      - task: bootstrap_tasks:packer

  dev_setup:
    desc: Install git and gh, authenticate gh, configure Git auth, and install code-server
    cmds:
      - task: install
      - task: auth
      - task: code-server

  proxmox_bootstrap:
    desc: Bootstrap the Proxmox automation user, ACL, and API token
    cmds:
      - task: proxmox:api-user

  terraform_plan:
    desc: Initialise and plan the Terraform Proxmox stack
    cmds:
      - task: terraform:init
      - task: terraform:validate
      - task: terraform:plan

  platform:apply:
    desc: Provision infrastructure and render Ansible inventory
    cmds:
      - task: terraform:apply
      - task: ansible:inventory:render

  service:authentik:deploy:
    desc: Provision infrastructure and deploy authentik on the identity_authentik hosts
    cmds:
      - task: terraform:apply
      - task: ansible:inventory:render
      - task: ansible:playbook
        vars:
          PLAYBOOK: ansible/playbooks/identity.yml
          LIMIT: identity_authentik

  service:freeipa:deploy:
    desc: Provision infrastructure and deploy FreeIPA on the identity_freeipa hosts
    cmds:
      - task: terraform:apply
      - task: ansible:inventory:render
      - task: ansible:playbook
        vars:
          PLAYBOOK: ansible/playbooks/identity.yml
          LIMIT: identity_freeipa
