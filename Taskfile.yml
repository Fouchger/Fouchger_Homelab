# ================================================================
# File: Taskfile.yml
# Purpose:
#   Root Taskfile entry point for the homelab repository.
#
# Notes:
#   - Includes the reusable secrets, GitHub, and host bootstrap task sets.
#   - Host bootstrap tasks are included without flattening to avoid task-name
#     collisions with existing repository workflows.
#   - Root alias tasks are provided for the most common bootstrap operations.
# ================================================================

version: '3'

silent: true

includes:
  secrets:
    taskfile: ./tasks/secrets.Taskfile.yml
    flatten: true
  git_gh:
    taskfile: ./tasks/git_gh.Taskfile.yml
    flatten: true
  proxmox:
    taskfile: ./tasks/proxmox.Taskfile.yml
    flatten: true
  bootstrap_tasks:
    taskfile: ./tasks/bootstrap.Taskfile.yml
    flatten: false

tasks:
  all:
    desc: Run the standard homelab secrets bootstrap tasks
    cmds:
      - task: init
      - task: tools:check
      - task: sops:bootstrap
      - task: openbao:prepare:runtime

  day1:
    desc: Complete day-1 secrets bootstrap for the homelab
    cmds:
      - task: init
      - task: tools:install
      - task: sops:bootstrap
      - task: openbao:bootstrap:standalone
      - task: report
      - task: ssh:keys


  dev_setup:
    desc: Install git and gh, authenticate gh, configure Git auth, and install code-server
    cmds:
      - task: install
      - task: auth
      - task: code-server

  proxmox_bootstrap:
    desc: Bootstrap the Proxmox automation user, ACL, and API token
    cmds:
      - task: proxmox:api-user
      